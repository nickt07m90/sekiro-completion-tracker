        const rawWalkthroughText = `

Part 1: Wolf and the Divine Heir

Playthrough 1
External image
This will be a comprehensive playthrough where you fully explore the world, find all collectibles, and defeat all available bosses.

The game starts with an introductory cinematic that lays the story foundation. When you first gain control of your character, you have no weapons, barely any health, and cannot run. Pick up the Ornamental Letter, which tells you to carefully make your way to the Moon-view Tower. Move forward and you will be prompted to jump and then wall jump; do so to get to an outside area called Ashina Reservoir. You will see two large buildings ahead in the distance and as you move forward, you will notice a wall on the left with specific markings where you will be told that cn_X can be used to hug the wall. Do so and make your way along the cliffside to reach the next area. Once you get across, you can peek out to see the Moon-view Tower off in the distance.

External image
Stop hugging the wall and you will get a notification explaining stealth. By crouching in tall grass, moving slowly, and staying out of the enemy's line of sight, you can often sneak up on (or past) enemies without being noticed. If an enemy senses you, a black triangle will appear above his head and start to turn yellow. Once it turns completely yellow, the enemy becomes alerted and will start to look around for you. You can still deal stealth deathblows when an enemy is on alert with a yellow triangle, but it's more difficult to sneak up on them without being detected. Should they fully detect your presence, the triangle will turn red and they will actively seek you out. You cannot deal a stealth deathblow on an enemy who is aware of your presence.

Some nearby enemies will be talking and you want to carefully make your way towards the building on the left where you will get a notification about underfloor movement. Continue through the tall grass to remain undetected, heading under the building and you will see your first Eavesdrop prompt at an enemy above you. Do so by pressing cn_down when within range and you will get some background/story info. Exit through the opening ahead and continue through the tall grass towards the Moon-view Tower. You can get another Eavesdrop opportunity as you continue forward.

Drop down to a ledge below and you will be prompted to hang from the cliff. Notice the white markings along the cliffside. These will appear throughout the game as places that can be grabbed on to, either to climb up or to shimmy along. Hang from the ledge and shimmy across to the other side, then climb up and continue forward. Jump across a gap and you'll see another shimmy spot on the right. As you approach you'll get a lesson on jump ledge hanging, so do so to reach the next ledge. From here, jump, climb, and shimmy left to the hole in the side of the tower, then climb in to trigger a cutscene where you are introduced to Kuro, the Divine Heir.

External image
After this scene, the first achievement will unlock:

Revered Blade
Received the "Kusabimaru" from Kuro
Revered Blade
1 guide
Offline Mode - These achievements require play in game modes that do not necessitate a connection to any online services.Single Player - These achievements can be obtained by a single player.Main Storyline - These achievements are gained automatically by progressing through the main game modes.
Talk to Kuro again to receive the Healing Gourd, which is the Sekiro equivalent of the Estus Flask in Dark Souls. This reusable healing item can be used once for now but you will be able to increases maximum uses as you progress through the game. Equip the Gourd in your first quick items slot, then use it to restore some health. Head up to the top of the tower to find a Pellet, a single use healing item (equip this in another quick item slot), then open the door at the bottom and head outside. You will be given a brief explanation of posture and deathblows.

There are a few enemies patrolling outside that can be killed from behind if you're careful, but you also might have to fight them directly if they get alerted to your presence. This will be your first opportunity to engage in combat, specifically to practice deflecting attacks (as opposed to just flailing away and defeating enemies through brute force, which will likely work against these weak enemies). Kill the first two enemies and you will receive a notification about using Deflection. The next enemy is stronger and will block your attacks, so time a deflect properly, then deal the deathblow.

You will see two enemies guarding a doorway, so kill them and then two more beyond the doorway. Continue forward to meet your first real challenge, a mini-boss named Leader Shigenori Yamauchi. Mini bosses require two (or more) deathblows to kill. Carefully attack and deflect Yamauchi's attacks to fill his posture meter, deliver a deathblow, and repeat to kill him.

You will find a locked door at the end of the path, so make your way around to the right and you'll see an elevated bridge in the distance. Run onto a thick tree branch and jump across to grab onto the top of the wall, then climb up, continue forward along the wall, and jump up to grab onto a ledge that runs along the side of the bridge. Shimmy to the right and you will get another Eavesdrop opportunity, then climb up when you can. Follow the path under the bridge and kill a small enemy on the other side before doing a ledge hang on the left side. Shimmy all the way left, then drop down and pick up another pellet before continuing forward to the door at the bottom.

External image
Inspect it and you can blow the whistle to call for Kuro, which triggers a brief cutscene. Talk with Kuro again, then continue along a tunnel path and you will reach an open outside area. Continue forward to trigger another cutscene, after which you will be attacked by Genichiro Ashina.
External image
It is expected that Genichiro easily defeats you, but it is actually possible to win this battle (although extremely unlikely until you get a firm grasp on the combat). The game advances the same either way - your left arm is chopped off, the Divine Heir is taken away, and you are left for dead.

4. Part 2: Ashina Outskirts and Hirata Estate

External image
After a brief cutscene, you will receive the Shinobi Prosthetic, unlocking an achievement:

Shinobi Prosthetic
Acquired the Shinobi Prosthetic
Shinobi Prosthetic
1 guide
Offline Mode - These achievements require play in game modes that do not necessitate a connection to any online services.Single Player - These achievements can be obtained by a single player.Main Storyline - These achievements are gained automatically by progressing through the main game modes.
Talk to the Sculptor for some backstory. As you exit his hut you will see the first Sculptor's Idol outside. Head to it and you will be prompted to use cn_X to commune. Do so to get a brief Sculptor's Idol explanation. You can grab two Pellets nearby and a Light Coin Purse around the back of the Sculptor's Hut. Off to the right, you can find Hanbei the Undying, an NPC who can teach you the basics of attacking, deflecting, and dodging. You should definitely practice combat with him before moving on.

Next to Hanbei is the Offering Box, which is where important items that you fail to collect and are no longer accessible end up. This applies to certain items sold by NPCs or found in areas that you lose access to through story advancement.

Head through the wooden arch and you'll get a Grappling Hook notification that explains how to grapple around. Approach the tree branch and when the grapple point turns green, press cn_LB to grapple to it, then continue forward to reach Ashina Outskirts. Grapple across another gap to find a Sculptor's Idol, use it to unlock fast travel between idols. There are enemies patrolling the area ahead and after killing the first you'll get a notification about acquiring enemy loot (hold cn_X to pull in the sen and any items that defeated enemies drop, press cn_X to pick up items found on the ground throughout the world). You will also receive experience for killing enemies that starts to fill an experience bar.

If you hug the right side of the area you will find a cliff below that you can drop to with a cave that contains an Ako's Sugar. Grapple back up the main path and continue exploring this area, killing enemies and grabbing any items around. You'll reach an area with three dogs and a ledge with a Sculptor's Idol. Dogs will charge and jump at you, which can be deflected to perform a deathblow just like with other enemies. Rest at the idol, then grapple onto a nearby building ledge and go in through a hole in the wall. You'll see an item next to a corpse on the left, the Shuriken Wheel.

External image
You'll then receive a basic prosthetic tools explanation.
Use the previous idol to travel back to the Dilapidated Temple. You'll see a new NPC, Emma the Physician, outside the Sculptor's hut. Talk to her to find out about the Healing Gourd and how to upgrade it, then go inside and talk to the Sculptor. Choose "Present Shinobi Prosthetic," then "Fit New Prosthetic Tool" to access the Create Arm Tools menu. Choose to create the Loaded Shuriken (Prosthetic Tool 1/10) from the Shuriken Wheel, then equip the Loaded Shuriken via the equipment menu. Head back to the Sculptor's Idol and you'll get a notification explaining Spirit Emblems, which are basically ammo for prosthetic tools. Commune at the idol and travel back to Outskirts Wall - Gate Path in Ashina Outskirts.

Grapple back into the nearby building ahead and look out the hole in the opposite wall.

External image
You'll see a lone warrior to the left of a banner on the other side of the area. This is General Naomori Kawarada (VIDEO), a mini-boss that requires two deathblows to defeat. For mini-bosses, you want try to deal the first deathblow from stealth. Drop to the ledge beyond the hole and circle around the area to the left to get on the roof behind him undetected, then either drop down and sneak up behind him or run and jump from the roof to perform a plunging deathblow. He will be the strongest enemy you've faced thus far and is capable of killing you very quickly with his attacks, which are strong and quick. Remember that unless the red kanji appears indicating a perilous attack, all of his attacks can be deflected. You'll need to figure out the timing and pattern of his attacks and deflect when you can, then counter attack.
Defeat him to receive a Prayer Bead (1/40) and a Gourd Seed (1/9). Then return to the Sculptor's Idol, travel to the Dilapidated Temple, and give Emma the Gourd Seed to increase Healing Gourd uses by one. Travel back to the Outskirts Wall - Gate Path idol and make your way back to the roof from where you jumped onto General Naomori Kawarada for the first deathblow. Looking out ahead, off to the left you'll see a platform with a tent and several crows.

External image
Straight out and off to the right you'll see a building, some raised tower-like structures, and a platform with some enemies.
External image
There are actually several enemies in this area, including a large Sumo-like enemy behind the raised platform behind the tall tower that is best dispatched from behind (direct combat with him is pretty tough). Also be aware of the enemy in the building left of center as he will shoot you with a rifle. Carefully kill all of the enemies in this area and loot the items, then find another building in the back of the area with a woman standing inside on the second level. Tell her "I'm not your son" to receive the Young Lord's Bell Charm, then talk to her son to to the left of the house. You can also break some boxes at the base of the house to find three Light Coin Purses. If you look off to the left, you'll see that the path leads past some enemies and into another large building.
External image
Before going through the wooden arch, grapple up to the left to reach a platform at the base of the raised platform from earlier with the tent on top. You'll see another grapple point up above, use it to reach the top and interact with the NPC in the tent to unlock an achievement:
Memorial Mob
Encountered the Memorial Mob
Memorial Mob
1 guide
Offline Mode - These achievements require play in game modes that do not necessitate a connection to any online services.Single Player - These achievements can be obtained by a single player.
Purchase Robert's Firecrackers by using Light Coin Purses to get the 500 sen required. Looking back towards the building in the distance you'll notice an enemy with a cannon on a platform. Be careful with him as he will shoot you if he sees you. Drop down on the left, grapple across a gap to a tree branch and you'll see a different grapple icon on a branch ahead:

External image
This type of grapple icon indicates a swing point, you will continue forward with momentum rather than grappling to it. Use it to cross the gap, then sneak around the right to the enemy with the cannon and kill him from behind (he will drop a Black Gunpowder, an eventual upgrade item). There are three enemies down below and it's up to you whether or not you want to bother with them. If you head to the ledge to the left of this platform you'll see a grapple point on a branch below with some platforms that you can explore if you'd like, but there's nothing important down there.
Make your way over the roof of the large building to see an area ahead with a Sculptor's Idol off to the right. Commune and rest at the idol, then travel to the Dilapidated Temple. Have the Sculptor Fit New Prosthetic Tool, then create the Shinobi Firecracker from Robert's Firecrackers (Prosthetic Tool 2/10) which is a useful tool for stunning enemies, particularly beasts. I use this prosthetic tool far more than any other as the stun effect works against normal enemies and bosses, allowing you to get some damage in, interrupt their attacks, or regroup/heal. Note that after using the firecracker on bosses, they will be immune to the effect for 15 or so seconds so you can't just spam it to keep them stunned.

Travel back to the Outskirts Wall - Stairway idol, drop to the path below, and backtrack to the large building to find an NPC seated in the doorway. Select "That night?" from the conversation and he will offer information for 10 sen. Pay him for some information on the Hirata Estate and an alleged previous meeting. He offers more information for 20 sen; pay him and he will tell you about a "tube with fire blasting out of it" and you will receive the Flame Barrel Memo which makes mention of a bonfire. Mental note. This NPC, Anayama the Peddler, will now become a vendor with inventory available after resting at an idol. You can do so, then return to him to see his inventory and he will ask you to find out what the Ashina Samurai are in need of. Turn around and you'll see some red beams of light on the ground.

External image
Interact with this Remnant for some backstory, then head through the open wooden door for an Eavesdrop opportunity. You'll see an enemy in the distance with his head covered, bound and tied up. This is the Chained Ogre (VIDEO), another mini boss that can be pretty tough.
NOTE: You must kill the Chained Ogre to progress, but if you struggle to beat him, you can skip the rest of this area for now and go back to the Dilapidated Temple and instead follow the path to Hirata Estate as explained below.

First, kill the two nearby enemies. Then rush up to the ogre and around to the left and take out the spear enemy (the ogre will wake up and break free). Quickly run back towards the idol until the Ogre loses aggro, which you know happens when his health bar disappears. Then sneak up along the cliff on the left to get behind him for a stealth deathblow.

Unlike with almost every other enemy, you want to dodge the Ogre's attacks rather than deflect them. He will do a two-hand smash, a series of three kicks, an elbow drop, a flying dropkick, and a perilous grab, so try to anticipate what is coming and dodge out of the way. After dodging an attack you can likely counter attack two or three times before needing to dodge again. Chip away slowly until you can perform the second deathblow to kill him, earning a Prayer Bead (2/40) and a latent skill that increases the potency of health recovery items. Then grapple into the hole in the building at the top of the steps and pick up the Nightjar Monocular from the nearby corpse. Look left and you'll an item on a corpse at the end of the hall, a Gourd Seed (2/9). Grab it and head back to the Sculptor's Idol, then travel to the Dilapidated Temple and have Emma reinforce your Healing Gourd up to three uses. She will discuss several other story related matters and direct you to talk to the Sculptor. Talk to him to receive the Shinobi Esoteric Text, which unlocks the first skill tree (assuming you've gained a skill point by now). Head back to the Sculptor's Idol and you will be told about acquiring skills.

For now, the only skill tree available is Shinobi Arts. The first skill you want to get is Mikiri Counter, which costs two skill points. This skill allows you to counter an enemy's perilous thrust attack with cn_LS + cn_B, essentially dodge towards the thrust (you can practice this skill with Hanbei after unlocking it). Moving forward, you want to get Whirlwind Slash and then a Shinobi's Karma: Body to open up Breath of Life: Light, which is incredibly helpful as it restores health each time you perform a deathblow. You need 1, 2, and 5 skill points, though, so it may be a while until you have enough. For now, travel back to the Outskirts Wall - Stairway idol.

Note: Whirlwind Slash is a Combat Art that must be equipped in the inventory menu. Use it by pressing cn_LB + cn_RB.

Head back into the building beyond where the Ogre was again and look out through the hole in the wall. You'll see a few enemies around, including the next mini-boss, General Tenzen Yamauchi (VIDEO).

External image
Under the tree out on the right is a small enemy that rings a bell when he sees you to alert everyone else. Your goal here is to clear out all the normal enemies, then back up so that Yamauchi loses aggro, then go back and deal the first deathblow from stealth. He is a slightly more difficult version of General Naomori Kawarada, deflect/counteract and be ready to jump over his perilous sweeps or Mikiri counter his perilous thrusts. Once you kill him, you'll get a Prayer Bead (3/40).

There is a path to the right of this area that leads to what seems to be a dead end on a broken wooden platform (you'll see a Divine Confetti and a note about a dangerous "Headless" on the side of the structure).

External image
There is a grapple point on a tree branch ahead and from there, if you look down you can see a ledge that can be grabbed on to. Jump towards it and press cn_X to grab on, then shimmy left and climb up. Jump down to a platform below and enter a cave, dropping down and crawling through a low path to proceed. Once the cave opens up, you can see the Headless enemy below, but stay away from him and instead exit the cave to the right. Once outside, look up for a grapple point, then use it and follow a series of grapple points to reach an area above. Grapple up and into a hole on the side of a building and open the door that was locked on the other side. Follow the hallway around and you'll be back to the area where you fought General Tenzen Yamauchi.
If you go to the back of this area you'll see a broken bridge that would lead to Ashina Castle, but you need to find another way to get there.

External image
Grapple to the tree branch down and to the left of the bridge and jump down to a platform with a Sculptor's Idol, then travel to the Dilapidated Temple. "Pray" at the Buddha statue to the left of the Sculptor to trigger a cutscene and you will be transported to Hirata Estate... three years earlier?
Commune with the nearby Sculptor's Idol. Walk to the edge of the cliff and the estate will loom large in the distance.

External image
You'll notice smoke billowing from a fire - a bonfire, perhaps? Jump off the cliff and grapple on the way down to avoid fall damage, then interact with the injured man on the hill. "Ask what happened" and "Ask what year it is" for backstory before jumping down to the bridge. Go to the left side to find a Dousing Powder at the end of the bridge, then go right through a gap in the wall to get to the riverbank. You'll find an item behind a giant stone, a Treasure Carp Scale. Grapple back onto the bridge and make your way across. You'll be attacked by dogs on the other side (which can be killed easily with shurikens). Grapple over the wall to find a Sculptor's Idol, but before pressing on, grapple back over (towards the bridge) and head left down to the river where you'll be attacked by another enemy and dog. Swim out to the island of rocks to the left and grab the Light Coin Purse and talk to the NPC in a barrel, Pot Noble Harunaga, who sells items for Carp Scales. You will need to purchase the Floating Passage Text eventually in order to make one of the final skills available, but you don't have to worry about it now.
Note: the Mask Fragment is one of three parts of an item that allows you to use 5 skill points to increase your attack power. Do not bother assembling the mask or wasting skill points to increase attack power. Trust me.

There are a couple of fish swimming around nearby that drop Treasure Carp Scales if killed, but it's not necessary to hassle with chasing them down. When you're done here, head back to the idol. The path ahead leads past a few enemies and to a door that is currently locked. To the right of the idol is an area with several enemies, so climb over the wall to clear them out and loot items. On the far side of this area is a tree branch that can be grappled to.

External image
This next area has more enemies, dogs, and an archer on one of the roofs. Carefully clear the area and collect items, then approach the bonfire and pick up the item within to receive the Flame Barrel, a Shinobi Tool.
External image
Continue along the path past a dying man who tells you about the Shinobi Axe in the temple (which is in the small area on the other side of the wall across from him). There's an Eavesdrop opportunity down the path to the right, so listen in, then head the opposite way to open the door that was blocking the path from the Sculptor's Idol. Head back to the idol to rest, then return (you can go over the wall/tower by the idol to avoid the enemies along the path). Once through the previously locked door, approach the doors on the right for an Eavesdrop opportunity, then take out the enemies (grapple to the roof over the door and stealth kill one first). A third enemy in the building on the left may notice you. Once it's clear, open the marked door.
External image
Pick up the item inside - the Shinobi Axe of the Monkey, a Shinobi Tool. Use the Homeward Idol to return to the Dilapidated Temple and have the Sculptor create the Loaded Axe (Prosthetic Tool 3/10) from the Shinobi Axe of the Monkey and the Flame Vent from the Flame Barrel (Prosthetic Tool 4/10). You will then receive the Prosthetic Esoteric Text, which opens up a new skill tree. The only skill of immediate interest is Grappling Hook Attack, but the priority is still to get to Breath of Life: Light in the Shinobi Arts Tree. With that said, head back to Estate Path in Hirata Estate and make your way back to the two guys you Eavesdropped on along the main path (just beyond where the Shinobi Axe of the Monkey was).
Climb onto the left wall and get onto the roof overlooking the two enemies at the door. Do a plunging attack onto the one with the axe, then kill the other. Climb back over the roof you jumped from and talk to an NPC trying to open the door in the area below. It's Anayama the Peddler from the Ashina outskirts, the NPC who offered information for sen and mentioned 1) an item in the bonfire and 2) having met you before. Here, he talks about a three story pagoda that likely contains treasure. Grapple over the other structure in this area to find a Bundled Jizo Statue. Head back to the main path and grapple over the door that the two enemies were trying to get into. There is an Eavesdrop opportunity in here as well as two options for dialogue (one gives you an Antidote Powder). Return to the main path and follow it until you see a normal enemy and two shielded enemies. You can destroy their shields with the Loaded Axe (which opens them up to an immediate deathblow). Beyond them is a bridge that leads into the next area.

External image
This area contains four normal enemies and another mini boss, Shinobi Hunter Enshin of Misen. Kill the normal enemies, then back up as far as you need to to lose Enshin's aggro so you can deal the first deathblow via stealth.
Enshin of Misen (VIDEO) is equipped with a spear that grants him a long range. Deflect his normal attacks and be prepared to Mikiri counter his perilous thrust. Defeat him to receive a Prayer Bead (4/40) and go through the doors ahead to reach a Sculptor's Idol. Choose "Enhance Physical Attributes" and redeem your four Prayer Beads to receive the First Prayer Necklace, which permanently increases vitality, health and posture by 20% (if you skipped the Chained Ogre to come to Hirata Estate, you'll won't yet have four Prayer Beads).

Make your way down the path and you'll see a grapple point on the left side. Use it, then look up and to the right and you will see the three-story pagoda that Anayama was talking about. Jump into the river and swim to the right and under the bridge until you see another grapple point. Grapple out and follow the path to the end where you can break a bamboo wall to enter a cave. Do a consecutive wall jump to get to the top where you'll see a set of steps that lead up to the pagoda.

Before you approach it, notice a purple samurai on the roof. This Lone Shadow samurai (VIDEO) is far stronger than any other normal enemy you've encountered to this point and will be very difficult to kill. They are prevalent later in the game, both as a standard enemies and as mini bosses. He uses a few different attacks, the most dangerous of which is a five kick combo that starts with a low spinning kick and ends with a perilous kick that can be Mikiri countered. He hits incredibly hard and deals a lot of posture damage even with perfect deflections, so a more practical strategy is to run by him to the pagoda and and loot the item inside, which is Mist Raven's Feathers, a Shinobi Tool. Then run away and travel back to the Sculptor's Idol. Make your way along the path until you reach a bridge where you'll see a sumo-type enemy on the other side. Instead of crossing directly into him, go to the left side of the bridge and you'll see a tree branch that you can grapple across to. If you want to kill these enemies, jump up and immediately stealth kill them sumo guy before killing the rest. When you're done, head up the path towards the burning area.

External image
You'll find Owl sitting against a large rock, talk to him to advance the story and he will give you the Hidden Temple Key. The only way out now is to grapple to a tree, then onto a tall pagoda. From here you need to grapple down to a small hut along the cliff, then across to another, and then across to a third. From here you can drop to a ledge behind a small building; go around the left and stealth kill the nearby enemy. You can Eavesdrop on the two enemies to the right at the entrance to a cave. There are a couple more enemies out to the left and another in the cave - it's up to you whether you want to kill them all or just run into the cave and climb up and out at the end. Once you reach the top, you'll be in a burning village area with a Sculptor's Idol around the corner.

External image
Commune and rest, then follow the path around to the right to reach a large open area. There are several enemies along the path and a couple more in the building on the right. Your goal is to get to the larger open area on the left where the mini-boss Juzou the Drunkard (VIDEO) is flanked by several minions. There is a tall rock that can be grappled on to in front of the area with all the enemies and to the right of this rock is a friendly NPC, Nogami Gensai, who will help you with the battle once you talk to him (hold of before doing so).
External image
Start by killing the two enemies in the building on the left, then follow the outer path around to stealth kill a shielded enemy standing in front of Juzou. It will get a little chaotic as you run around the area and take out the rest of the normal enemies while staying away from Juzou so he doesn't smash you. Once they are dead, run away to lose Juzou's aggro, then sneak back and deal the first deathblow from stealth. Immediately run over and talk to Nogami so he will join the fight. With Juzou's attention split between you, this battle should be much more manageable.

After defeating Juzou you will receive an Unrefined Sake and a Prayer Bead (5/40). Continue forward into the building and explore the left side to find a hallway with a mural at the end. Hug the wall here to activate a secret door (GIF) and enter a new area that contains a few items and a treasure chest with a Prayer Bead (6/40). Exit this area the way you came and you can break through a wall ahead and on the left (or go around via the way you entered this building) to make your way to a Sculptor's Idol. There are two NPCs in this area, one of which will give you a Snap Seed. Continue forward and "Shift the Tatami aside" to reveal a path that leads to a locked door. Unlock it with the Hidden Temple Key and you will see the Divine Heir in a large room with a burning roof. This area is where you fight Lady Butterfly, who is optional for story progression but required for achievement purposes. There is no urgency to defeat her now and doing so will be rather troublesome, but feel free to try if you'd like. Instead, travel from the nearby Sculptor's Idol back to the Underbridge Valley idol in Ashina Outskirts and progress in that direction so that you can improve damage and vitality before bothering with Lady Butterfly.

Drop down to a platform below and continue forward down a couple more platforms until you get the mid-air grappling hook notification. You will see a grapple point across the gap that is too far to reach, but you can grapple to it by jumping towards it and grappling in mid-air. Quickly run across the branch and platform to hug a wall at the end and a giant snake will appear and survey the area. You need to get past this snake with stealth, so wait for it to look away and then grapple across to a branch, then jump to the platform below with some tall grass and crouch within so the snake can't see you.

External image
Wait again for it to look away and quickly run and jump across to another grapple point, then get into the nearby cave as quickly as you can.
Exit the cave and turn left. Jump across a gap and quickly crouch in the tall grass. When it's safe, move up to a wall that you can hug. If the snake attacks you, try to get back to the gap in the ground just outside the cave and grab onto a ledge. Shimmy all the way to the left and watch the snake, as soon as he looks away, climb up and rush to the huggable wall. Shimmy across a gap to the right and the snake should not see you. Wait again for it to look away and then quickly get into the nearby enclosure and press cn_X to "Enter Palanquin". The snake will start to look inside and once it gets close enough, you'll get a deathblow prompt on its eye. Press cn_RB and for a brief QTE, then run in the direction beyond the palanquin (GIF). Quickly grapple to a branch, carefully run across it and when you get to the end, look up and jump for another grapple point (a swing) that you can use to reach a final grapple point in a cave. Run through the cave and once outside you'll see a grapple point across a gap.

External image
Grapple to it, then grapple up a few more times to reach a Sculptor's Idol. I suggest that you continue saving your skill points until you can get the Breath of Light: Life skill from the Shinobi Arts tree, but the Grappling Hook Attack skill in the Prosthetic Arts tree will be helpful against an upcoming boss.
Jump over the nearby wall, stealth kill the closest enemy, then quickly jump back and you should go unnoticed. Drop down to the ledge below the idol and follow the wall around to an Ako's Sugar, then jump up and grab onto the wall. An enemy will approach from the left and once he gets close enough, do a hanging deathblow to kill him. There are a few more enemies in this immediate area - two in the open area ahead that you can Eavesdrop on, one with a gun in the structure in front of you, and a large sumo guy behind this structure. Climb up and quickly stealth kill the gunner, then back into the corner to try to avoid detection from the two enemies below. Wait for the large enemy to walk past and stealth kill him from behind, then finish off the remaining two however you see fit. Loot the area (there is a Heavy Coin Purse in the building below the gunner), then grapple up to a nearby ledge to find another red light Remnant. Kill the patrolling enemy beyond the nearby broken wall and look right to find a squatting enemy under a tree that you can Eavesdrop on. Do so (he mentions that beasts can be startled- perhaps with the Shinobi Firecracker), then stealth kill him. Run up the nearby steps to find some pellets and a locked door, then grapple onto a tree and then the nearby roof overlooking an enclosed battlefield.

External image
Drop down and prepare for the first major boss, Gyoubu Masataka Oniwa (VIDEO).
This boss will be on his horse for the whole battle and wields a large spear. It's important to remember that except for his perilous attacks, every attack he does can be deflected and since he doesn't attack that quickly, getting your posture broken isn't the end of the world. You could even guard his attacks practically forever as long as you manage posture build up. You want to be very careful in attacking him directly as if you over commit to attacks, you won't be able to guard or deflect his attacks and you'll get punished.

As soon as you drop in, charge towards him and attack several times until he rides away. From there, try to stay close, chip away at his health, and be prepared to deflect his attacks. Guarding is better than getting hit but in future encounters, try not to rely on guarding and instead aim to deflect whenever possible.

You can use the Shinobi Firecracker to make his horse rear up, which provides some time to get in a few attacks but be careful as his counterattack will usually come quickly.

He will occasionally ride away from you and this often gives you a grapple opportunity (where you can use Grappling Hook Attack). Grapple to him, then continue chipping away and deflecting attacks.

His slashing attacks are similar but he does a few different patterns that you'll need to work out the timing for. The most common is two quick slashes, then a slow overhead slash. Deflecting the third attack gives you time to get some counterattacks in.

He will also swing his spear around in a wide circle at the end of a rope. You can simply guard this each time the spear comes around or grapple to him.

He will rarely do a jumping attack (horse included) and come down with a spear slash that you can deflect.

He has two perilous attacks. For the first, he sticks his spear into the ground and rides towards you, jump out of the way if he gets close to avoid being impaled. For the second, he throws his spear straight at you, then pulls it back in - deflect it or dodge out of the way.

Once you break his posture you can perform the first deathblow, then repeat the process for the second deathblow, after which you will be prompted to perform a finisher deathblow (Shinobi Execution), which is standard for all main bosses. After defeating Oniwa, an achievement will unlock:

Gyoubu Masataka Oniwa
Defeated "Gyoubu Masataka Oniwa"
Gyoubu Masataka Oniwa
4 guides
Offline Mode - These achievements require play in game modes that do not necessitate a connection to any online services.Single Player - These achievements can be obtained by a single player.Main Storyline - These achievements are gained automatically by progressing through the main game modes.
You will also receive Memory: Gyoubu Oniwa, the Mechanical Barrel, and a notification about Prosthetic Tool Upgrades.

There are two ways to exit the battlefield, but first head towards the Sculptor's Idol to commune and rest. You will receive a notification about Enhancing Attack Power, which can be done with Battle Memories. Choose "Enhance Attack Power" and do so with Gyoubu's memory to permanently increase your attack power (from 1 to 2). From here, turn around and run across the area and up some steps.

External image
Turn right at the top, enter the building, and talk to the crouching NPC who identifies himself as the Tengu of Ashina.
External image
Accept his offer to kill rats in the area, which are the short enemies wearing bamboo hats. You can open a nearby door which allows access to the previous area and idol and talk to a female NPC, then take the steps next to the Tengu up to the next level. Pick up the Light Coin Purse and you should notice a grapple point on a ledge above (GIF). Use it, then continue to the top of the building to reach an attic with a chest that contains a Prayer Bead (7/40). Exit the building, go left, and up some steps to find another Memorial Mob.
External image
Buy the Gourd Seed (3/9) for 1000 sen (come back asap if you can't afford it now), then use the Homeward Idol to travel to the Dilapidated Temple so Emma can reinforce your Healing Gourd.
5. Part 3: Ashina Castle

External image
Travel back to the Ashina Castle Gate idol in Ashina Outskirts and open the door next to it. Sprint along the path and quickly kill the first enemy, then grapple onto the nearby roof. Ahead/to the left is the forward path guarded by some enemies, but look right and you can eavesdrop on two rats under a tree. A third rat is under a tree to the left of the other two, so stealth kill it, then the other two (the Loaded Axe is good against them). After doing so run back to the Tengu to receive the Ashina Esoteric Text which unlocks another skill tree. The two skills in the second column, Ascending and Descending Carp, are good passives so work on getting them unlocked after Breath of Life: Light. Head back to the idol and continue along the forward path, killing several enemies/dogs in the second area. Upon entering the third area, you'll see some tall grass on the right, an enemy with his back to you, and a large sumo guy hammering the ground.
External image
There is another sumo enemy around the corner wall on the right and a second normal enemy a little further beyond as well. Stealth kill the first enemy and fall back into the tall grass. You may have to inch forward to trigger the second sumo enemy to wander your way, and once he does, fall back to remain undetected. Once he turns around, stealth kill him, then run back to lose aggro from the remaining two enemies. Once that is done, return to stealth kill the second sumo enemy, then kill the remaining normal enemy and loot items in the immediate area. The path then curves to the right and you get an Eavesdrop opportunity.
External image
Listen in, then kill the two enemies before moving forward into the next area.
You'll see an enemy with his back to you and a few more further in behind a fence. Entering this area triggers a battle with the Blazing Bull (VIDEO). The bull wildly thrashes around the area and will kill the enemies for you. I found it easiest to get some distance from him so he charges at you, deflect his charge so he falls down (GIF), run up and attack his head a few times, then run away and repeat. Another option is to try to run in circles so it chases you and falls down, deal some chip damage, then run and repeat. The Shinobi Firecracker can also stun him briefly. After dealing then one required deathblow, you will receive a Prayer Bead (8/40) and the Shinobi Medicine Rank 2 latent skill which further increases the potency of healing items. Two enemies will then come from the far door to check on the commotion. Kill them, then enter the doors they came through and rest at the Sculptor's Idol. Consume four prayer beads to receive the Second Prayer Necklace, acquire skills if needed, then look left and grapple across the gap to a branch.

External image
Eavesdrop on the two enemies on the bridge, then kill them to receive the Gatehouse Key. Grapple onto the roof ahead and you'll see a large enemy and some dogs below. Look right and you can see Ashina Reservoir and the Moon-view tower from the start of the game. Drop to the courtyard with the dogs and run past them into the door ahead, then continue forward to find a Sculptor's Idol. Rest here, then talk to the Dungeon Memorial Mob nearby. If you have 1400 sen, purchase the Prayer Bead (9/40), then consider buying coin purses with your remaining sen to prevent losing it upon death. This Prayer Bead isn't absolutely necessary now so don't worry if you can't afford to buy it (plus, you're going to want to buy a prosthetic tool for 1600 sen in the not too distant future). Continuing on leads to the Abandoned Dungeon, but you have no business there so travel back to the Ashina Castle idol.

You're going to spend some time exploring Ashina Castle and the surrounding area. There are enough Prayer Beads for the next prayer necklace, which you want before the required boss in the castle. From the idol, go through the door and interact with the Remnant. Then head left for now and open a door on the right. Open the next door and loot the items outside by the tree. Go back inside and drop off on the right, pick up the pellets, then open another door and commune with the Ashina Reservoir Sculptor's Idol. This area should start to look familiar as it's the first area you played through when you started the game.

External image
Eavesdrop on the two nearby guards, then kill them and the two dogs (remember that shuriken can one-shot dogs). There are a few ways to proceed from here. Beyond the doorway are several enemies that will notice you if you go that way, so instead go onto a tree branch to the left, then look to the right and grapple across to another branch. Jump over the wall and jump down to kill the alarm enemy. Beyond him, you can look right to see a grapple point that leads to the well you started the game in that now contains a Lone Shadow mini-boss. You'll deal with him soon so don't bother going that way yet. Instead, turn around and stealth kill the enemy in front of you, then quickly retreat to avoid being detected by the gun-wielding enemy next to the building on the left. Approach the building and open the door with the Gatehouse Key, then go inside to find a Heavy Coin Purse and a chest containing Gyobu's Broken Horn, a Shinobi Tool. Exit, then sneak under the building through the hole to the left of the door. Stealth kill the gunner enemy out the other side, then follow the path to the left and stealth kill another. There are a few enemies left in front of you, two larger enemies that you really don't want to engage directly and two normal enemies.

External image
A tough mini-boss stands at the entrance to the Moon-tower. Backtrack under the building and circle around the left and down some steps to stealth kill the first normal enemy, waiting until the larger guy walks away, then get behind the wall to the right. Drop down and kill then first large enemy when he turns around and the second large guy isn't looking your way, then get behind the wagon on your left so you can then stealth kill the second large guy and the final normal enemy. Should you get detected, run away until aggro fades. It's now time to face Seven Ashina Spears – Shikibu Toshikatsu Yamauchi (VIDEO), but the good news is that if you die, you can run to him from the idol without having to fight any of enemies in the area. Follow this path so you can get quickly to him for a stealth deathblow (GIF).

This guy is tough. Really tough. You can come back for him later when you're stronger if you want but with some practice and persistence, you can kill him now. After the first deathblow, lead him back to the open area next to the steps so none of the other enemies bother you. You need to learn the timing of his attacks to deflect, Mikiri counter, or avoid them properly. A poorly timed deflect will result in major posture damage.

He has a few swinging attacks, one with a slow double windup. Deflecting this almost always leads to a perilous thrust that can be Mikiri Countered. He may then counter attack with a fast swipe that, if deflected, staggers him briefly. Jump over his perilous sweep and take care to manage posture buildup by guarding when you can.

Defeating him rewards you with a Prayer Bead (10/40). Grapple on to the pagoda to find a Bundled Jizo Statue and then interact with the remnant inside before using the Homeward idol to return to the Dilapidated Temple. Talk to the Sculptor and he will fit the Mechanical Barrel into the Shinobi Prosthetic, allowing you access to Prosthetic Tool Upgrades. You should be able to get the Spinning Shuriken upgrade here, so do so if you can. These upgrades aren't direct upgrades but separate equippable tools, so once you leave the menu, switch to the new Shuriken in your equipment menu. Talk to the Sculptor again and Present Shinobi Prosthetic to fit a new tool and create the Loaded Spear from Gyobu's Broken Horn (Prosthetic Tool 5/10) and the Mist Raven from Mist Raven's Feathers (Prosthetic Tool 6/10), then return to the Ashina Reservoir idol.

Go left around the building and grapple across again, quickly killing the alarm enemy on the other side of the wall. Grapple across the gap to the right and interact with a non-important NPC if you'd like. Continue further to find a hole in the ground, and looking down you can lock onto an enemy below.

External image
This mini-boss is the Lone Shadow Longswordman (VIDEO), a more difficult version of the purple ninja that was guarding Mist Raven's Feathers at the three-story pagoda in Hirata Estate. Start the battle with a plunging deathblow from above, then prepare for another difficult battle that you can also come back for later should it prove too difficult. Like with Seven Ashina Spears, if you spend some time learning his attacks, you should be able to deflect and counter-attack to eventually defeat him. Remember that he starts a five kick combo with a low spinning kick that ends with a perilous attack that you can Mikiri Counter. His slower spinning kick is almost always followed up with a perilous sweep. Defeat him to receive a Prayer Bead (11/40), then continue into the water at the end of the area and swim to the end to find a grapple point. Drop into the Abandoned Dungeon and follow along the right side wall. When you come to a ledge, back up and do a running jump across to land on the ledge slight below and in front of you. Be very careful not to fall to the lowest part of the area or you'll aggro a Shichimen Warrior that you have zero chance to not get murdered by. Loot the Bulging Coin Purse along the path ahead, then commune/rest at the Sculptor's idol and travel back to the Ashina Castle idol.
At the top of the steps in front of the idol is another mini-boss flanked by several rifle-wielding enemies.

External image
Ignore them for now and look right to see a grapple point. From this ledge you can see some enemies below, another grapple point, and an enemy on a roof across the way. Grapple over and defeat him, then look back and you'll see a series of smoke plumes across the buildings ahead of you. You eventually want to make your way to the far one on the right so that you can grapple across to the ledge of the large building in the back, but for now, drop down and kill the enemies below and loot items in the immediate area.
There isn't much to this part of the castle. A single path leads between some buildings and has several more enemies and dogs. Take them out however you see fit (stealth or directly) as you move down the path and go around a wall on the left at the end to find a friendly NPC.

External image
Say "Yes" when asked and he will give you an item, then exhaust his dialogue so that he will relocate to the Dilapidated Temple as a vendor. You will be coming back shortly to deal with General Kuranosuke Matsumoto, the mini-boss at the top of the steps but for now, grapple onto the rooftops and make your way around to the far smoke signal, taking out enemies as you progress. There are two more to deal with once you make the grapple across to the main building, so be prepared. You'll then see a kite in the air ahead and as you approach it you'll be dive-bombed by an enemy, so when you see him, hold cn_LB to guard so you don't get pummeled.
Head right at where the kite rope connects. There are several more enemies in the area so proceed with caution. Looking right at the end, you'll see a grapple point in a window but be extremely careful as there is an enemy below this window that you will run at you and explode.

External image
Upon entering the window you can open a chest to find a Gourd Seed (4/9), then rest at the Sculptor's Idol in the corner. Travel back to the Dilapidated Temple so Emma can reinforce your Healing Gourd. You'll also notice that Fujioka the Info Broker has relocated to the right of the path that leads to Hanbei. He offers numerous items for sale including a Gourd Seed for 2000 sen which you likely cannot afford, especially since you are about to meet another NPC that sells a Shinobi Tool for 1600 sen that you want to buy. Remember to buy this Gourd Seed when you can afford it.
Fujioka also sells two memos, which give info on item locations. You already found the prosthetic Shinobi Tool in the Three-story Pagoda in Hirata Estates. The Sabimaru memo says that a special sword can be found on the bottom floor of the Ashina Castle Keep, which you will be visiting shortly. If you are worried about losing sen, feel free to buy coin purses from him. Once you are done here, return to the Upper Tower - Antechamber idol in Ashina Castle.

Before continuing, take a moment to look at your skill trees. Your skill point progress will likely be different than mine, especially if you have died and lost exp. Skills to prioritize should be:
1) Breath of Life: light in the Shinobi Arts tree (you should have this by now)
2) Grappling Hook Attack in the Prosthetic Arts tree
3) Ascending and Descending Carp in the Ashina Arts tree to deal extra posture damage with and after deflections
4) Shinobi Eyes in the Shinobi Arts tree which deals more posture damage when doing a Mikiri Counter
5) Suppress Presence and Sound in the Shinobi Arts tree to make you stealthier

Assuming you've killed all the mini-bosses I've pointed out thus far and bought the Prayer Bead I pointed out for 1400 sen, you'll be one away from an upgrade. There is one to be found in the next area, so leave the idol and head up the steps. Turn right and go to the end of the hall, then turn left and into the next room to sneak up behind a new enemy for a deathblow. These blue-robed Ashina Samurai are formidable opponents and much stronger than any other normal enemies to this point. They will deflect almost all of your attacks and can only be defeated through deflection and Mikiri Counters (or from stealth). Open the nearby door and you'll see some more enemies in this room. Wait momentarily until the samurai turns in front of you, then sneak up to stealth kill him. Look right and you'll see two more enemies walking blindly. Wait so you can stealth kill the first from behind, then move towards the second samurai who should stop at a window in the next room. Stealth kill him. If you look left from the window you'll see an enemy sitting behind a folding screen.

External image
There are actually two enemies here. If you're quick you can stealth kill the first but you'll have to fight the second. Again, this Ashina Samurai is stronger and faster than other normal enemies and you'll need to deflect his attacks in order to kill him. Pay attention when attacking and always stop when your attack is deflected, which is usually after your second attack (the first will just be blocked) and be ready to deflect his counter attack. Once he is dead, approach the mural on the far wall in between the samurai statues (ignore the grapple point in the ceiling for now) and press "X" to hug the wall, activating a hidden door and moving you to a secret area (GIF). Loot the items (smash a screen to find a Heavy Coin Purse) and open the chest to find a Prayer Bead (12/40), then return to the idol and use your four prayer beads to receive the Third Prayer Necklace. If you didn't buy the Prayer Bead for 1400 sen from the NPC by the Abandoned Dungeon Entrance idol, you'll be one short. You'll want to purchase an item for 1600 sen soon so unless you think you'll have enough or both, don't worry about this particular prayer bead right now. You'll soon be dealing with General Kuranosuke Matsumoto who you saw earlier and he drops one.
Rest, then kill all the enemies again in the next room again. Once they are dead, look down into the large opening and you'll see a grapple point on the central wooden beam.

External image
Jump over to grapple to it, then lock onto the enemies below and toggle to the Ashina Samurai. Jump off and deliver a plunging deathblow on him, then fight off the other three enemies. This is the bottom floor of the Castle Keep as mentioned in the Sabimaru Memo. Move into the next room, pick up the items on the ground, then open the chest to find Sabimaru, a Shinobi Tool. Turn around and head to the room on the opposite side of the keep to open the locked door. This should look familiar, it's the steps that lead back to the Ashina Castle idol and the mini-boss you skipped - General Kuranosuke Matsumoto (VIDEO). You might as well take him out while you're here and if there are any issues you can rest at the Ashina Castle idol. Run out and take out his friends (there's no good way to do this, sadly), then get away to lose his aggro. Once you do, climb onto the nearby roofs to deliver the first deathblow from stealth.
Like with other enemies, you want to deflect his attacks so you need to learn his patterns. Jump over his perilous sweep and punish him after, get away from his perilous grab, and deflect his other attacks until you can deliver the second death blow, killing him and earning a Prayer Bead (13/40). Loot the nearby chest for a Divine Grass (a single-use item that heals you and cures status debuffs), then head back into the keep and to another locked door at the opposite end. If you need to rest, you'll likely want to travel to the Upper Tower - Antechamber idol, kill the nearby enemies, then drop back down to plunge kill the blue-robed samurai and his friends so you don't have to face all four of them directly. After unlocking the other locked door at the bottom level of the keep, you'll come to an outside area with water in from of you and a bridge to the right.

External image
Follow the path around to the right and you'll see a grapple point on a tree branch. Move to it, then jump to the ledge along the wall. There are two enemies to the left and the one with the spear is moderately tough. Stealth kill him if you can (he drops a Heavy Coin Purse), then take out the other. There are two exits nearby, one to the bridge you just saw and a second to the right. Take that one to reach a Sculptor's Idol.
Head through a door to the left of the idol to find a Dragon's Blood Droplet by some tombstones. Then head back and look over the cliff to the left of the idol to see a building with a hole in the roof.

External image
Drop down and into the hold to meet Blackhat Badger. You want to buy the Iron Fortress Shinobi Tool for 1600 sen, so redeem coin purses if you need to (or go farm enemies, perhaps near the Upper Tower - Antechamber idol) so you can afford it. Feel free to explore the area outside this building but there is nothing of vital importance other than a bunch of enemies and some random items. The cannon enemies in the towers are particularly dangerous, so if you choose to clear this area, treat them with caution. If you make it out to the broken bridge at the bottom, you'll see that you are across the way from an area you came through much earlier (before you ran past the giant snake that you ended up stabbing in the eye).
From the nearby Old Grave idol, backtrack and take the other exit that leads to a bridge.

External image
Eavesdrop on the two enemies, then kill them (stealth kill the larger samurai to make things easier), then kill the third enemy at the end of the bridge and continue forward through the large doorway and down a snowy path. Along the way, you'll be attacked by monkeys but they should pose little threat. At the end, you'll find a building with a Sculptor's Idol. Commune and rest, then head out onto the balcony and you'll see a grapple point across the gap. Go back to the front of the building to get onto the roof, then do a running jump towards the grapple points to grapple to the other side. Once you're across, take the consumable from the temple and drop down to the platform below. Go to the right side of this platform and look down to see a Sculptor's Idol below a tree branch that you can grapple to. Jump down and commune, then turn around and go to the opposite end of the platform to see a grapple point. Grapple across and quickly take out the two enemies there. Look up and to the left to see a ledge you can wall jump and climb up to. Do so to get to the next platform and follow it to the end, then climb up to the next platform above. Shimmy along the wall to the other side and you'll reach a ledge overlooking an area below.
External image
Jump down, take out the enemy on the right and loot the items in the area, one of which is a Prayer Bead (14/40). Then return to the Under-shrine Valley Idol.
Head forward and grapple across a gap, then kill the nearby enemy and enter a cave. Grapple left across two branches, kill an enemy, then look for a climbing point up and to the left. Grapple along a path, kill some enemies, and look up to the left to see another ledge you can climb up to. At the top, you'll find a rare upgrade material called Yellow Gunpowder and a Gourd Seed (5/9). Use the Homeward Idol to return to the Dilapidated Temple.

If you can scrounge together 2000 sen, buy the Gourd Seed (6/9) from Fujioka. Upgrade the Healing Gourd with Emma, then interact with the Sculptor to fit a new prosthetic. Create the Sabimaru (Prosthetic Tool 7/10) and the Loaded Umbrella from the Iron Fortress (Prosthetic Tool 8/10), then travel back to the Upper Tower - Antechamber idol in Ashina Castle. Clear out the nearby enemies and get to the room on the right side with a grapple point in the ceiling. Grapple up and make your way around to the next room and you'll see another hole and two enemies below.

External image
The farther enemy is the more dangerous of the two but I couldn't find a way to stealth kill him, so stealth kill the other from above, turn around and kill the harmless old woman, and then kill the stronger enemy. If the two Ashina samurai in the next room rush in to investigate, you'll need to grapple up to safety and regroup. Note that you can unlock the door from this side so you don't have to go through the ceiling in the future. Feel free to engage the two Ashin samurai if you want but there's a Sculptor's Idol in the room above that you should probably commune with first. Also, note that the wall at the end of the hall is weak and can be broken to access an area that is unimportant for now (a mini-boss will be fought here much later).
At the top of the stairs, you'll see a Remnant that you can investigate. When you are ready, open the door by the idol and prepare to fight Ashina Elite – Jinsuke Saze (VIDEO). This mini-boss attacks with his sword from a sheathed position blindingly fast and deals huge damage, both to health and to posture if not deflected precisely. The best way to beat him is through deflection and it's completely possible normally, but using the Loaded Umbrella makes it a lot easier. Stand face to face at the ready and when you see him go for his sword (indicated by the flash of light by his hand), immediately press cn_RT to use the Loaded Umbrella and it should deal a ton of posture damage to him. Repeat this until you can perform both deathblows, after which you'll receive a Prayer Bead (15/40). There are a few items in this room and if you interact with the tapestry, you'll get an explanation of lightning reversal.

External image
At this point, the next step is to climb out the nearby window, grapple up to an area above, and face the next major boss, Genichiro Ashina. Before doing so, I suggest traveling back to Hirata Estate and killing Lady Butterfly, which is an easier battle (and her memory will improve your damage).

Note: Snap Seeds are helpful in this battle. You can go back and find five in the area where you stabbed the giant snake in the eye near the Underbridge Valley idol in Ashina Outskirts.

Travel to the Hirata Audience Chamber idol and continue forward into the room at the end to trigger a cutscene, followed by a battle with Lady Butterfly (VIDEO). When you were here initially you were considerably weaker, so the battle should be more manageable. The downside in waiting until now is that if you had killed her earlier, you would have gotten her memory to improve your damage output, which may have made other encounters easier.

The key to this battle is staying aggressive and deflecting everything you can. Attack her until you get deflected, then be ready for her counter attack. If she responds with a melee attack, deflect it, then repeat. If you mistime the deflect, she will follow up with two additional attacks that you want to deflect.

She may instead just jump away and throw shuriken at you. If she jumps into the air and floats, throw Shuriken to try to knock her down. While airborne, she may dodge from side to side and then throw shuriken at you, charge down to you with a melee combo, or just jump over and land behind you (causing you to lose lock on).

She has two perilous attacks: a sweep during ground combat (jump over it) and a grab from the air (run away as soon as you see the kanji).

For her second phase, she will appear in front of the Buddha statue, so be prepared to start attacking her again as soon as she drops in. Use the same technique of aggressiveness, deflection, and shurikens. When she summons the apparitions, you can either run into the middle of them and use a Snap Seed, which will destroy them all, or run away and wait for her to dispel them, which launches a volley of projectiles at you that is best avoided by getting behind a pillar.

After you deal the second deathblow, you can then perform the Shinobi Execution to kill her, unlocking an achievement:

The Phantom Lady Butterfly

You will also receive Memory: Lady Butterfly and a Sakura Droplet. A cutscene will then play out, after which you will awaken in the Sculptor's hut. Talk to him and "ask what the Buddha showed him" for some foreshadowing, then rest at the idol and choose to enhance attack power with Memory: Butterfly to permanently increase your attack power (from 2 to 3).

And now it's time. Head back to the Upper Tower - Ashina Dojo idol in Ashina Castle and prepare for a boss battle that takes the difficulty to the next level. Head into the dojo, out the window, and around to the right to see two grapple points. Use them to get to the level above and a cutscene will unfold, followed by the battle with Genichiro Ashina (VIDEO).

Genichiro requires two deathblows to defeat, after which he begins his second phase which requires one more deathblow. The key with this battle is to stay aggressive and attack into his blocks (usually twice), stopping when you get deflected to then react to his counterattack. He has three perilous attacks - a swipe that must be jumped over, a thrust that can be Mikiri countered, and a grab attack that you need to quickly jump away from to avoid. He can also unleash a flurry of several attacks that you should try to deflect which can result in a great amount of posture damage if done properly. He starts by rearing back, then unleashing a few attacks and then doing another windup before unleashing several more. You can also back up after the first flurry and let him whiff with the second. He almost always follows his leaping downward slash with a perilous thrust, so deflect the slash, then be prepared to do a Mikiri Counter if necessary. He will also sometimes jump into the air and shoot a few arrows at you, so guard as soon as you see this coming. You will be filling his posture meter for the deathblows and not draining his health so try to stay aggressive with him so his posture bar doesn't deplete.

After the second deathblow, his second phase starts. He almost always leads with a lunging perilous thrust that you want to Mikiri counter. Try to stay aggressive like you were with phase one and watch out for his lightning attack which you can respond to with the Lightning Reversal by jumping with the right timing, getting hit with the lightning attack, then pressing cn_RB BEFORE LANDING to send the lightning back to him, stunning him briefly. After filling his posture meter and dealing the third deathblow you will be prompted to perform the Shinobi Execution to kill him, unlocking an achievement:

Genichiro Ashina
