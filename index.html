    <style>

<body>

    <header>
        <h1>Sekiro Walkthrough Tracker</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p id="progressText">0% Completed</p>
    </header>

    <main id="checklist"></main>

    <script>
        // Data strictly retained. Internal backticks have been escaped (\`) to prevent code crashes.
        const rawWalkthroughText = `
This will be a comprehensive playthrough where you fully explore the world, find all collectibles, and defeat all available bosses.

The game starts with an introductory cinematic that lays the story foundation. When you first gain control of your character, you have no weapons, barely any health, and cannot run. Pick up the Ornamental Letter, which tells you to carefully make your way to the Moon-view Tower. Move forward and you will be prompted to jump and then wall jump; do so to get to an outside area called Ashina Reservoir. You will see two large buildings ahead in the distance and as you move forward, you will notice a wall on the left with specific markings where you will be told that can be used to hug the wall. Do so and make your way along the cliffside to reach the next area. Once you get across, you can peek out to see the Moon-view Tower off in the distance. 

Stop hugging the wall and you will get a notification explaining stealth. By crouching in tall grass, moving slowly, and staying out of the enemy's line of sight, you can often sneak up on (or past) enemies without being noticed. If an enemy senses you, a black triangle will appear above his head and start to turn yellow. Once it turns completely yellow, the enemy becomes alerted and will start to look around for you. You can still deal stealth deathblows when an enemy is on alert with a yellow triangle, but it's more difficult to sneak up on them without being detected. Should they fully detect your presence, the triangle will turn red and they will actively seek you out. You cannot deal a stealth deathblow on an enemy who is aware of your presence.

Some nearby enemies will be talking and you want to carefully make your way towards the building on the left where you will get a notification about underfloor movement. Continue through the tall grass to remain undetected, heading under the building and you will see your first Eavesdrop prompt at an enemy above you. Do so by pressing when within range and you will get some background/story info. Exit through the opening ahead and continue through the tall grass towards the Moon-view Tower. You can get another Eavesdrop opportunity as you continue forward.

Drop down to a ledge below and you will be prompted to hang from the cliff. Notice the white markings along the cliffside. These will appear throughout the game as places that can be grabbed on to, either to climb up or to shimmy along. Hang from the ledge and shimmy across to the other side, then climb up and continue forward. Jump across a gap and you'll see another shimmy spot on the right. As you approach you'll get a lesson on jump ledge hanging, so do so to reach the next ledge. From here, jump, climb, and shimmy left to the hole in the side of the tower, then climb in to trigger a cutscene where you are introduced to Kuro, the Divine Heir. 

After this scene, the first achievement will unlock:
Revered Blade
Received the "Kusabimaru" from Kuro
1 guide

Talk to Kuro again to receive the Healing Gourd, which is the Sekiro equivalent of the Estus Flask in Dark Souls. This reusable healing item can be used once for now but you will be able to increases maximum uses as you progress through the game. Equip the Gourd in your first quick items slot, then use it to restore some health. Head up to the top of the tower to find a Pellet, a single use healing item (equip this in another quick item slot), then open the door at the bottom and head outside. You will be given a brief explanation of posture and deathblows. 

There are a few enemies patrolling outside that can be killed from behind if you're careful, but you also might have to fight them directly if they get alerted to your presence. This will be your first opportunity to engage in combat, specifically to practice deflecting attacks (as opposed to just flailing away and defeating enemies through brute force, which will likely work against these weak enemies). Kill the first two enemies and you will receive a notification about using Deflection. The next enemy is stronger and will block your attacks, so time a deflect properly, then deal the deathblow. 

You will see two enemies guarding a doorway, so kill them and then two more beyond the doorway. Continue forward to meet your first real challenge, a mini-boss named Leader Shigenori Yamauchi. Mini bosses require two (or more) deathblows to kill. Carefully attack and deflect Yamauchi's attacks to fill his posture meter, deliver a deathblow, and repeat to kill him.

You will find a locked door at the end of the path, so make your way around to the right and you'll see an elevated bridge in the distance. Run onto a thick tree branch and jump across to grab onto the top of the wall, then climb up, continue forward along the wall, and jump up to grab onto a ledge that runs along the side of the bridge. Shimmy to the right and you will get another Eavesdrop opportunity, then climb up when you can. Follow the path under the bridge and kill a small enemy on the other side before doing a ledge hang on the left side. Shimmy all the way left, then drop down and pick up another pellet before continuing forward to the door at the bottom. 

Inspect it and you can blow the whistle to call for Kuro, which triggers a brief cutscene. Talk with Kuro again, then continue along a tunnel path and you will reach an open outside area. Continue forward to trigger another cutscene, after which you will be attacked by Genichiro Ashina. 

It is expected that Genichiro easily defeats you, but it is actually possible to win this battle (although extremely unlikely until you get a firm grasp on the combat). The game advances the same either way - your left arm is chopped off, the Divine Heir is taken away, and you are left for dead.

4. Part 2: Ashina Outskirts and Hirata Estate

After a brief cutscene, you will receive the Shinobi Prosthetic, unlocking an achievement:
Shinobi Prosthetic
Acquired the Shinobi Prosthetic
1 guide

Talk to the Sculptor for some backstory. As you exit his hut you will see the first Sculptor's Idol outside. Head to it and you will be prompted to use to commune. Do so to get a brief Sculptor's Idol explanation. You can grab two Pellets nearby and a Light Coin Purse around the back of the Sculptor's Hut. Off to the right, you can find Hanbei the Undying, an NPC who can teach you the basics of attacking, deflecting, and dodging. You should definitely practice combat with him before moving on.

Next to Hanbei is the Offering Box, which is where important items that you fail to collect and are no longer accessible end up. This applies to certain items sold by NPCs or found in areas that you lose access to through story advancement.

Head through the wooden arch and you'll get a Grappling Hook notification that explains how to grapple around. Approach the tree branch and when the grapple point turns green, press to grapple to it, then continue forward to reach Ashina Outskirts. Grapple across another gap to find a Sculptor's Idol, use it to unlock fast travel between idols. There are enemies patrolling the area ahead and after killing the first you'll get a notification about acquiring enemy loot (hold to pull in the sen and any items that defeated enemies drop, press to pick up items found on the ground throughout the world). You will also receive experience for killing enemies that starts to fill an experience bar.

If you hug the right side of the area you will find a cliff below that you can drop to with a cave that contains an Ako's Sugar. Grapple back up the main path and continue exploring this area, killing enemies and grabbing any items around. You'll reach an area with three dogs and a ledge with a Sculptor's Idol. Dogs will charge and jump at you, which can be deflected to perform a deathblow just like with other enemies. Rest at the idol, then grapple onto a nearby building ledge and go in through a hole in the wall. You'll see an item next to a corpse on the left, the Shuriken Wheel. 

You'll then receive a basic prosthetic tools explanation.

Use the previous idol to travel back to the Dilapidated Temple. You'll see a new NPC, Emma the Physician, outside the Sculptor's hut. Talk to her to find out about the Healing Gourd and how to upgrade it, then go inside and talk to the Sculptor. Choose "Present Shinobi Prosthetic," then "Fit New Prosthetic Tool" to access the Create Arm Tools menu. Choose to create the Loaded Shuriken (Prosthetic Tool 1/10) from the Shuriken Wheel, then equip the Loaded Shuriken via the equipment menu. Head back to the Sculptor's Idol and you'll get a notification explaining Spirit Emblems, which are basically ammo for prosthetic tools. Commune at the idol and travel back to Outskirts Wall - Gate Path in Ashina Outskirts.

Grapple back into the nearby building ahead and look out the hole in the opposite wall. You'll see a lone warrior to the left of a banner on the other side of the area. This is General Naomori Kawarada (VIDEO), a mini-boss that requires two deathblows to defeat. For mini-bosses, you want try to deal the first deathblow from stealth. Drop to the ledge beyond the hole and circle around the area to the left to get on the roof behind him undetected, then either drop down and sneak up behind him or run and jump from the roof to perform a plunging deathblow. He will be the strongest enemy you've faced thus far and is capable of killing you very quickly with his attacks, which are strong and quick. Remember that unless the red kanji appears indicating a perilous attack, all of his attacks can be deflected. You'll need to figure out the timing and pattern of his attacks and deflect when you can, then counter attack.

Defeat him to receive a Prayer Bead (1/40) and a Gourd Seed (1/9). Then return to the Sculptor's Idol, travel to the Dilapidated Temple, and give Emma the Gourd Seed to increase Healing Gourd uses by one. Travel back to the Outskirts Wall - Gate Path idol and make your way back to the roof from where you jumped onto General Naomori Kawarada for the first deathblow. Looking out ahead, off to the left you'll see a platform with a tent and several crows. Straight out and off to the right you'll see a building, some raised tower-like structures, and a platform with some enemies. 

There are actually several enemies in this area, including a large Sumo-like enemy behind the raised platform behind the tall tower that is best dispatched from behind (direct combat with him is pretty tough). Also be aware of the enemy in the building left of center as he will shoot you with a rifle. Carefully kill all of the enemies in this area and loot the items, then find another building in the back of the area with a woman standing inside on the second level. Tell her "I'm not your son" to receive the Young Lord's Bell Charm, then talk to her son to to the left of the house. You can also break some boxes at the base of the house to find three Light Coin Purses. If you look off to the left, you'll see that the path leads past some enemies and into another large building. 

Before going through the wooden arch, grapple up to the left to reach a platform at the base of the raised platform from earlier with the tent on top. You'll see another grapple point up above, use it to reach the top and interact with the NPC in the tent to unlock an achievement:
Memorial Mob
Encountered the Memorial Mob
1 guide

Purchase Robert's Firecrackers by using Light Coin Purses to get the 500 sen required. Looking back towards the building in the distance you'll notice an enemy with a cannon on a platform. Be careful with him as he will shoot you if he sees you. Drop down on the left, grapple across a gap to a tree branch and you'll see a different grapple icon on a branch ahead: This type of grapple icon indicates a swing point, you will continue forward with momentum rather than grappling to it. Use it to cross the gap, then sneak around the right to the enemy with the cannon and kill him from behind (he will drop a Black Gunpowder, an eventual upgrade item). There are three enemies down below and it's up to you whether or not you want to bother with them. If you head to the ledge to the left of this platform you'll see a grapple point on a branch below with some platforms that you can explore if you'd like, but there's nothing important down there.

Make your way over the roof of the large building to see an area ahead with a Sculptor's Idol off to the right. Commune and rest at the idol, then travel to the Dilapidated Temple. Have the Sculptor Fit New Prosthetic Tool, then create the Shinobi Firecracker from Robert's Firecrackers (Prosthetic Tool 2/10) which is a useful tool for stunning enemies, particularly beasts. I use this prosthetic tool far more than any other as the stun effect works against normal enemies and bosses, allowing you to get some damage in, interrupt their attacks, or regroup/heal. Note that after using the firecracker on bosses, they will be immune to the effect for 15 or so seconds so you can't just spam it to keep them stunned.

Travel back to the Outskirts Wall - Stairway idol, drop to the path below, and backtrack to the large building to find an NPC seated in the doorway. Select "That night?" from the conversation and he will offer information for 10 sen. Pay him for some information on the Hirata Estate and an alleged previous meeting. He offers more information for 20 sen; pay him and he will tell you about a "tube with fire blasting out of it" and you will receive the Flame Barrel Memo which makes mention of a bonfire. Mental note. This NPC, Anayama the Peddler, will now become a vendor with inventory available after resting at an idol. You can do so, then return to him to see his inventory and he will ask you to find out what the Ashina Samurai are in need of. Turn around and you'll see some red beams of light on the ground. Interact with this Remnant for some backstory, then head through the open wooden door for an Eavesdrop opportunity. You'll see an enemy in the distance with his head covered, bound and tied up. This is the Chained Ogre (VIDEO), another mini boss that can be pretty tough.

NOTE: You must kill the Chained Ogre to progress, but if you struggle to beat him, you can skip the rest of this area for now and go back to the Dilapidated Temple and instead follow the path to Hirata Estate as explained below.

First, kill the two nearby enemies. Then rush up to the ogre and around to the left and take out the spear enemy (the ogre will wake up and break free). Quickly run back towards the idol until the Ogre loses aggro, which you know happens when his health bar disappears. Then sneak up along the cliff on the left to get behind him for a stealth deathblow. Unlike with almost every other enemy, you want to dodge the Ogre's attacks rather than deflect them. He will do a two-hand smash, a series of three kicks, an elbow drop, a flying dropkick, and a perilous grab, so try to anticipate what is coming and dodge out of the way. After dodging an attack you can likely counter attack two or three times before needing to dodge again. Chip away slowly until you can perform the second deathblow to kill him, earning a Prayer Bead (2/40) and a latent skill that increases the potency of health recovery items. 

Then grapple into the hole in the building at the top of the steps and pick up the Nightjar Monocular from the nearby corpse. Look left and you'll an item on a corpse at the end of the hall, a Gourd Seed (2/9). Grab it and head back to the Sculptor's Idol, then travel to the Dilapidated Temple and have Emma reinforce your Healing Gourd up to three uses. She will discuss several other story related matters and direct you to talk to the Sculptor. Talk to him to receive the Shinobi Esoteric Text, which unlocks the first skill tree (assuming you've gained a skill point by now). Head back to the Sculptor's Idol and you will be told about acquiring skills. For now, the only skill tree available is Shinobi Arts. The first skill you want to get is Mikiri Counter, which costs two skill points. This skill allows you to counter an enemy's perilous thrust attack with dodge towards the thrust (you can practice this skill with Hanbei after unlocking it). 

Moving forward, you want to get Whirlwind Slash and then a Shinobi's Karma: Body to open up Breath of Life: Light, which is incredibly helpful as it restores health each time you perform a deathblow. You need 1, 2, and 5 skill points, though, so it may be a while until you have enough. For now, travel back to the Outskirts Wall - Stairway idol. Note: Whirlwind Slash is a Combat Art that must be equipped in the inventory menu.

Head back into the building beyond where the Ogre was again and look out through the hole in the wall. You'll see a few enemies around, including the next mini-boss, General Tenzen Yamauchi (VIDEO). Under the tree out on the right is a small enemy that rings a bell when he sees you to alert everyone else. Your goal here is to clear out all the normal enemies, then back up so that Yamauchi loses aggro, then go back and deal the first deathblow from stealth. He is a slightly more difficult version of General Naomori Kawarada, deflect/counteract and be ready to jump over his perilous sweeps or Mikiri counter his perilous thrusts. Once you kill him, you'll get a Prayer Bead (3/40).

There is a path to the right of this area that leads to what seems to be a dead end on a broken wooden platform (you'll see a Divine Confetti and a note about a dangerous "Headless" on the side of the structure). There is a grapple point on a tree branch ahead and from there, if you look down you can see a ledge that can be grabbed on to. Jump towards it and press to grab on, then shimmy left and climb up. Jump down to a platform below and enter a cave, dropping down and crawling through a low path to proceed. Once the cave opens up, you can see the Headless enemy below, but stay away from him and instead exit the cave to the right. Once outside, look up for a grapple point, then use it and follow a series of grapple points to reach an area above. Grapple up and into a hole on the side of a building and open the door that was locked on the other side. Follow the hallway around and you'll be back to the area where you fought General Tenzen Yamauchi.

If you go to the back of this area you'll see a broken bridge that would lead to Ashina Castle, but you need to find another way to get there. Grapple to the tree branch down and to the left of the bridge and jump down to a platform with a Sculptor's Idol, then travel to the Dilapidated Temple. "Pray" at the Buddha statue to the left of the Sculptor to trigger a cutscene and you will be transported to Hirata Estate... three years earlier?

Commune with the nearby Sculptor's Idol. Walk to the edge of the cliff and the estate will loom large in the distance. You'll notice smoke billowing from a fire - a bonfire, perhaps? Jump off the cliff and grapple on the way down to avoid fall damage, then interact with the injured man on the hill. "Ask what happened" and "Ask what year it is" for backstory before jumping down to the bridge. Go to the left side to find a Dousing Powder at the end of the bridge, then go right through a gap in the wall to get to the riverbank. You'll find an item behind a giant stone, a Treasure Carp Scale. Grapple back onto the bridge and make your way across. You'll be attacked by dogs on the other side (which can be killed easily with shurikens). 

Grapple over the wall to find a Sculptor's Idol, but before pressing on, grapple back over (towards the bridge) and head left down to the river where you'll be attacked by another enemy and dog. Swim out to the island of rocks to the left and grab the Light Coin Purse and talk to the NPC in a barrel, Pot Noble Harunaga, who sells items for Carp Scales. You will need to purchase the Floating Passage Text eventually in order to make one of the final skills available, but you don't have to worry about it now. Note: the Mask Fragment is one of three parts of an item that allows you to use 5 skill points to increase your attack power. Do not bother assembling the mask or wasting skill points to increase attack power. Trust me.

The path ahead leads past a few enemies and to a door that is currently locked. To the right of the idol is an area with several enemies, so climb over the wall to clear them out and loot items. On the far side of this area is a tree branch that can be grappled to. This next area has more enemies, dogs, and an archer on one of the roofs. Carefully clear the area and collect items, then approach the bonfire and pick up the item within to receive the Flame Barrel, a Shinobi Tool. 

Continue along the path past a dying man who tells you about the Shinobi Axe in the temple. There's an Eavesdrop opportunity down the path to the right, so listen in, then head the opposite way to open the door that was blocking the path from the Sculptor's Idol. Head back to the idol to rest, then return. Once through the previously locked door, approach the doors on the right for an Eavesdrop opportunity, then take out the enemies. Pick up the item inside - the Shinobi Axe of the Monkey, a Shinobi Tool. 

Use the Homeward Idol to return to the Dilapidated Temple and have the Sculptor create the Loaded Axe (Prosthetic Tool 3/10) from the Shinobi Axe of the Monkey and the Flame Vent from the Flame Barrel (Prosthetic Tool 4/10). You will then receive the Prosthetic Esoteric Text, which opens up a new skill tree. With that said, head back to Estate Path in Hirata Estate and make your way back to the two guys you Eavesdropped on along the main path.

Climb onto the left wall and get onto the roof overlooking the two enemies at the door. Do a plunging attack onto the one with the axe, then kill the other. Climb back over the roof you jumped from and talk to an NPC trying to open the door in the area below. It's Anayama the Peddler from the Ashina outskirts. Grapple over the other structure in this area to find a Bundled Jizo Statue. Head back to the main path and grapple over the door that the two enemies were trying to get into. There is an Eavesdrop opportunity in here as well as two options for dialogue. Return to the main path and follow it until you see a normal enemy and two shielded enemies. You can destroy their shields with the Loaded Axe. Beyond them is a bridge that leads into the next area. 

This area contains four normal enemies and another mini boss, Shinobi Hunter Enshin of Misen. Kill the normal enemies, then back up as far as you need to to lose Enshin's aggro so you can deal the first deathblow via stealth. Enshin of Misen (VIDEO) is equipped with a spear that grants him a long range. Deflect his normal attacks and be prepared to Mikiri counter his perilous thrust. Defeat him to receive a Prayer Bead (4/40) and go through the doors ahead to reach a Sculptor's Idol. Choose "Enhance Physical Attributes" and redeem your four Prayer Beads to receive the First Prayer Necklace.

Make your way down the path and you'll see a grapple point on the left side. Use it, then look up and to the right and you will see the three-story pagoda that Anayama was talking about. Jump into the river and swim to the right and under the bridge until you see another grapple point. Grapple out and follow the path to the end where you can break a bamboo wall to enter a cave. Do a consecutive wall jump to get to the top where you'll see a set of steps that lead up to the pagoda. Before you approach it, notice a purple samurai on the roof. This Lone Shadow samurai (VIDEO) is far stronger than any other normal enemy you've encountered to this point. Hit him hard or run by him to the pagoda and loot the item inside, which is Mist Raven's Feathers, a Shinobi Tool. Then run away and travel back to the Sculptor's Idol.

Make your way along the path until you reach a bridge where you'll see a sumo-type enemy on the other side. Instead of crossing directly into him, go to the left side of the bridge and you'll see a tree branch that you can grapple across to. When you're done, head up the path towards the burning area. You'll find Owl sitting against a large rock, talk to him to advance the story and he will give you the Hidden Temple Key. The only way out now is to grapple to a tree, then onto a tall pagoda. From here you need to grapple down to a small hut along the cliff, then across to another, and then across to a third. From here you can drop to a ledge behind a small building. Once you reach the top, you'll be in a burning village area with a Sculptor's Idol around the corner. 

Commune and rest, then follow the path around to the right to reach a large open area. There are several enemies along the path and a couple more in the building on the right. Your goal is to get to the larger open area on the left where the mini-boss Juzou the Drunkard (VIDEO) is flanked by several minions. Start by killing the two enemies in the building on the left, then follow the outer path around to stealth kill a shielded enemy standing in front of Juzou. Once they are dead, run away to lose Juzou's aggro, then sneak back and deal the first deathblow from stealth. Immediately run over and talk to Nogami so he will join the fight. 

After defeating Juzou you will receive an Unrefined Sake and a Prayer Bead (5/40). Continue forward into the building and explore the left side to find a hallway with a mural at the end. Hug the wall here to activate a secret door (GIF) and enter a new area that contains a few items and a treasure chest with a Prayer Bead (6/40). Exit this area the way you came and you can break through a wall ahead and on the left to make your way to a Sculptor's Idol. There are two NPCs in this area, one of which will give you a Snap Seed. Continue forward and "Shift the Tatami aside" to reveal a path that leads to a locked door. Unlock it with the Hidden Temple Key and you will see the Divine Heir in a large room with a burning roof. This area is where you fight Lady Butterfly. Instead, travel from the nearby Sculptor's Idol back to the Underbridge Valley idol in Ashina Outskirts.

Drop down to a platform below and continue forward down a couple more platforms until you get the mid-air grappling hook notification. You will see a grapple point across the gap that is too far to reach, but you can grapple to it by jumping towards it and grappling in mid-air. Quickly run across the branch and platform to hug a wall at the end and a giant snake will appear and survey the area. You need to get past this snake with stealth, so wait for it to look away and then grapple across to a branch, then jump to the platform below with some tall grass and crouch within so the snake can't see you. 

Wait again for it to look away and quickly run and jump across to another grapple point, then get into the nearby cave as quickly as you can. Exit the cave and turn left. Jump across a gap and quickly crouch in the tall grass. When it's safe, move up to a wall that you can hug. Wait again for it to look away and then quickly get into the nearby enclosure and press to "Enter Palanquin". The snake will start to look inside and once it gets close enough, you'll get a deathblow prompt on its eye. Press and for a brief QTE, then run in the direction beyond the palanquin (GIF). Quickly grapple to a branch, carefully run across it and reach a final grapple point in a cave.

Run through the cave and once outside you'll see a grapple point across a gap. Grapple to it, then grapple up a few more times to reach a Sculptor's Idol. Jump over the nearby wall, stealth kill the closest enemy, then quickly jump back. Drop down to the ledge below the idol and follow the wall around to an Ako's Sugar, then jump up and grab onto the wall. An enemy will approach from the left and once he gets close enough, do a hanging deathblow to kill him. Climb up and quickly stealth kill the gunner, then back into the corner. Wait for the large enemy to walk past and stealth kill him from behind, then finish off the remaining two. Run up the nearby steps to find some pellets and a locked door, then grapple onto a tree and then the nearby roof overlooking an enclosed battlefield. 

Drop down and prepare for the first major boss, Gyoubu Masataka Oniwa (VIDEO). This boss will be on his horse for the whole battle and wields a large spear. Except for his perilous attacks, every attack he does can be deflected. You can use the Shinobi Firecracker to make his horse rear up, which provides some time to get in a few attacks. Once you break his posture you can perform the first deathblow, then repeat the process for the second deathblow. After defeating Oniwa, an achievement will unlock:
Gyoubu Masataka Oniwa
Defeated "Gyoubu Masataka Oniwa"
4 guides

You will also receive Memory: Gyoubu Oniwa, the Mechanical Barrel, and a notification about Prosthetic Tool Upgrades. Head towards the Sculptor's Idol to commune and rest. Choose "Enhance Attack Power" and do so with Gyoubu's memory. Turn around and run across the area and up some steps. Turn right at the top, enter the building, and talk to the crouching NPC who identifies himself as the Tengu of Ashina. Accept his offer to kill rats in the area. Take the steps next to the Tengu up to the next level. Use the grapple point on a ledge above (GIF) and continue to the top of the building to reach an attic with a chest that contains a Prayer Bead (7/40). Exit the building, go left, and up some steps to find another Memorial Mob. Buy the Gourd Seed (3/9) for 1000 sen, then use the Homeward Idol to travel to the Dilapidated Temple.

5. Part 3: Ashina Castle

Travel back to the Ashina Castle Gate idol in Ashina Outskirts and open the door next to it. Sprint along the path and quickly kill the first enemy. Look right and you can eavesdrop on two rats under a tree. A third rat is under a tree to the left of the other two, so stealth kill it, then the other two. Run back to the Tengu to receive the Ashina Esoteric Text which unlocks another skill tree. Head back to the idol and continue along the forward path. In the third area, stealth kill the enemies and large sumo guy. The path then curves to the right and you get an Eavesdrop opportunity. Listen in, then kill the two enemies.

Entering this area triggers a battle with the Blazing Bull (VIDEO). The bull wildly thrashes around the area. I found it easiest to get some distance from him so he charges at you, deflect his charge so he falls down (GIF), run up and attack his head a few times, then run away and repeat. After dealing then one required deathblow, you will receive a Prayer Bead (8/40) and the Shinobi Medicine Rank 2 latent skill. Two enemies will then come from the far door. Kill them, then enter the doors they came through and rest at the Sculptor's Idol. Consume four prayer beads to receive the Second Prayer Necklace. Look left and grapple across the gap to a branch. 

Eavesdrop on the two enemies on the bridge, then kill them to receive the Gatehouse Key. Grapple onto the roof ahead. Drop to the courtyard with the dogs and run past them into the door ahead, then continue forward to find a Sculptor's Idol. Rest here, then talk to the Dungeon Memorial Mob nearby. If you have 1400 sen, purchase the Prayer Bead (9/40). Travel back to the Ashina Castle idol. From the idol, go through the door and interact with the Remnant. Then head left, open another door and commune with the Ashina Reservoir Sculptor's Idol. This area should start to look familiar as it's the first area you played through when you started the game. 

Eavesdrop on the two nearby guards, then kill them and the two dogs. Turn around and stealth kill the enemy in front of you. Approach the building and open the door with the Gatehouse Key, then go inside to find a Heavy Coin Purse and a chest containing Gyobu's Broken Horn, a Shinobi Tool. Exit, then sneak under the building through the hole to the left of the door. Stealth kill the gunner enemy out the other side, then follow the path to the left and stealth kill another.

It's now time to face Seven Ashina Spears – Shikibu Toshikatsu Yamauchi (VIDEO). Follow this path so you can get quickly to him for a stealth deathblow (GIF). Learn the timing of his attacks to deflect, Mikiri counter, or avoid them properly. Defeating him rewards you with a Prayer Bead (10/40). Grapple on to the pagoda to find a Bundled Jizo Statue. Return to the Dilapidated Temple. Talk to the Sculptor to fit the Mechanical Barrel, create the Loaded Spear from Gyobu's Broken Horn (Prosthetic Tool 5/10) and the Mist Raven from Mist Raven's Feathers (Prosthetic Tool 6/10), then return to the Ashina Reservoir idol.

Continue further to find a hole in the ground, and looking down you can lock onto an enemy below. This mini-boss is the Lone Shadow Longswordman (VIDEO). Start the battle with a plunging deathblow from above. Defeat him to receive a Prayer Bead (11/40), then continue into the water and swim to find a grapple point. Drop into the Abandoned Dungeon and follow along the right side wall. Loot the Bulging Coin Purse along the path ahead, then commune/rest at the Sculptor's idol and travel back to the Ashina Castle idol. At the top of the steps in front of the idol is another mini-boss. Ignore them for now and look right to see a grapple point.

Take them out however you see fit (stealth or directly) as you move down the path and find a friendly NPC. Exhaust his dialogue so that he will relocate to the Dilapidated Temple as a vendor. Grapple onto the rooftops and make your way around to the far smoke signal. You'll then see a kite in the air ahead and as you approach it you'll be dive-bombed by an enemy. Looking right at the end, you'll see a grapple point in a window. Upon entering the window you can open a chest to find a Gourd Seed (4/9), then rest at the Sculptor's Idol in the corner. Travel back to the Dilapidated Temple so Emma can reinforce your Healing Gourd. Fujioka the Info Broker has relocated near the path to Hanbei.

Return to the Upper Tower - Antechamber idol in Ashina Castle. Leave the idol and head up the steps. Turn right and sneak up behind a blue-robed Ashina Samurai for a deathblow. Once the room is clear, approach the mural on the far wall and press "X" to hug the wall, activating a hidden door (GIF). Loot the items and open the chest to find a Prayer Bead (12/40). Return to the idol and use your prayer beads to receive the Third Prayer Necklace. Once the enemies in the next room are dead, look down into the large opening and grapple to the wooden beam.

Jump off and deliver a plunging deathblow on the Ashina Samurai below. Move into the next room and open the chest to find Sabimaru, a Shinobi Tool. Head to the room on the opposite side to open the locked door. This leads to General Kuranosuke Matsumoto (VIDEO). Run out and take out his friends, then get away to lose aggro. Climb onto the nearby roofs to deliver the first deathblow from stealth. Defeat him to earn a Prayer Bead (13/40). After unlocking the other locked door at the bottom level of the keep, follow the path around to the right to reach a Sculptor's Idol.

Look over the cliff to the left of the idol to see a building with a hole in the roof. Drop down to meet Blackhat Badger. You want to buy the Iron Fortress Shinobi Tool for 1600 sen. From the nearby Old Grave idol, backtrack and take the other exit that leads to a bridge. Eavesdrop on the two enemies, then kill them. Continue forward and down a snowy path to find a building with a Sculptor's Idol. Jump down to the idol below a tree branch. Wall jump and climb up to reach a ledge overlooking an area below. Jump down, take out the enemy on the right and loot the items to find a Prayer Bead (14/40).

        // Logic
        const walkthroughChunks = rawWalkthroughText
            .split(/\n\s*\n/) // Splits by double line breaks (paragraphs)
            .map(chunk => chunk.trim())
            .filter(chunk => chunk.length > 0);

        const checklistContainer = document.getElementById('checklist');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        let savedProgress = JSON.parse(localStorage.getItem('sekiroTrackerData')) || {};

        function updateProgress() {
            const checkboxes = document.querySelectorAll('.checklist-item input[type="checkbox"]');
            const total = checkboxes.length;
            let checkedCount = 0;

            checkboxes.forEach(cb => {
                if (cb.checked) checkedCount++;
            });

            const percentage = total === 0 ? 0 : Math.round((checkedCount / total) * 100);
            progressBar.style.width = percentage + '%';
            progressText.innerText = `${percentage}% Completed (${checkedCount}/${total})`;
        }

        walkthroughChunks.forEach((text, index) => {
            const isChecked = savedProgress[index] || false;

            const itemDiv = document.createElement('div');
            itemDiv.className = `checklist-item ${isChecked ? 'checked' : ''}`;
            
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `chunk-${index}`;
            checkbox.checked = isChecked;

            const textSpan = document.createElement('div');
            textSpan.className = 'chunk-text';
            textSpan.innerText = text; 

            itemDiv.addEventListener('click', (e) => {
                if (e.target !== checkbox) {
                    checkbox.checked = !checkbox.checked;
                }
                
                if (checkbox.checked) {
                    itemDiv.classList.add('checked');
                    savedProgress[index] = true;
                } else {
                    itemDiv.classList.remove('checked');
                    savedProgress[index] = false;
                }

                localStorage.setItem('sekiroTrackerData', JSON.stringify(savedProgress));
                updateProgress();
            });

            itemDiv.appendChild(checkbox);
            itemDiv.appendChild(textSpan);
            checklistContainer.appendChild(itemDiv);
        });

        updateProgress();
    </script>
