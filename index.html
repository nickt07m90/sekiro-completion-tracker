You will also receive Memory: Genichiro and learn a Ninjutsu Technique: Bloodsmoke Ninjutsu.

External image
Nunjitsu are techniques that can be performed as a followup to a back-stab deathblow. Bloodsmoke Ninjutsu creates a cloud of smoke that disorients nearby enemies, causing them to lose track of you and allowing you to deal additional stealth back-stabs (or run away undetected). Open your inventory and equip it in the Ninjutsu slot.

Commune with the nearby Sculptor's Idol, then rest and choose to enhance attack power with Memory: Genichiro to permanently increase your attack power (from 3 to 4). Walk in the open doors and talk to Emma to further unfold the story. Go downstairs, commune with the Sculptor's Idol, and then talk to Kuro, the Divine Heir. When given the choice, you must select "Obey the Iron Code, Protect Kuro" to continue (you literally cannot choose the other option).

External image
Exhaust his dialogue, interact with the incense burner, then exhaust his dialogue again when he walks to another location. Open the nearby window and head outside. Look to the right and you'll see a balcony around the building across the way. Head across and into the building to meet Isshin Ashina. Go through all of his dialogue options (offer him the sake for additional backstory), then return to Kuro where a note in the middle of the room says he is in the Library. Pick up the Gun Fort Shrine key next to him, then exhaust his dialogue options. Give him the Sakura Droplet to trigger a brief scene, after which you'll receive an additional resurrection node. Talk to Emma by the Sculptor's Idol (offer her sake for additional backstory), then travel to the Abandoned Dungeon Entrance idol.
From this idol, you can go back into Ashina Castle or forward into the Abandoned Dungeon. Head forward into a cave-like area with crickets and unkillable zombie enemies that are best avoided. Feel free to explore this cave as you move forward, but there's nothing too important here (there is an NPC you can talk to begin an unnecessary side quest). You'll eventually reach another Sculptor's Idol in front of a cage.

External image
Commune with it, rest if needed, and continue forward into some water. Swim forward and you'll be able to climb back onto solid ground where you can kill a few enemies and find some items. This is a good place to test out Bloodsmoke Ninjutsu. Wall climb to grab on the ledge on the left, then sneak up and back-stab the standing enemy. During the deathblow animation you'll see another red deathblow circle - press cn_RB again to perform the ninjutsu technique, creating a large red cloud of smoke (GIF). Sneak around the side or back of the other enemy and back-stab him when the red circle appears (locking on makes it easier). Then kill the third enemy on the other side of the platform and loot the items.
Note: You can only use Ninjutsu techniques after dealing a back-stab deathblow from stealth, but the Vault Over skill in the Shinobi Arts tree allows you to deal a back-stab deathblow in the middle of combat to a posture broken enemy. You can then follow the back-stab up with Ninjutsu techniques in the middle of a chaotic situation.

Jump back into the water and continue forward until you see a ledge you can climb onto to perform a hanging deathblow on the nearby enemy, then climb up and kill the last enemy. You'll then come to a contraption with a lever that you can pull to call a lift.

External image
Do so, then pull the lever inside to be taken up to another area. Continue forward and you'll be greeted by an unseen entity and you'll see a Sculptor's Idol. Commune, interact with the tapestry on the wall, then head outside.
6. Part 4: Senpou Temple: Mt. Kongo

External image
Once you exit the building you'll be in Senpou Temple: Mt. Kongo. Look down and to the right and you'll see Kotaro sitting against a tree. Jump down and talk to him (ask why he's crying). Backtrack up the hill for an item, then go back to Kotaro and look down and left to see a Monk on a broken bridge below. Lock on and jump down to him to deliver a deathblow, then drop down and turn around to grab the items under the bridge. Feel free to kill the rat enemy by the kite contraption as you can't do what you eventually want to do with him and the kite just yet. Grapple/climb back up to the main path which leads the opposite direction from the broken bridge.

External image
This linear path leads to a building with a grapple point in the ceiling on the left side. There are several monk enemies along the way and I'll leave it to you to take them out and explore the area for items. The three monks walking together beyond the wooden structure present a good opportunity to use the Bloodsmoke Ninjutsu. A Heavy Coin Purse can be found on a ledge on the upper-right side of the area.

Once you reach the main building, you'll see a grapple point in the ceiling. Climb up and you'll be attacked by a bunch of crickets. Head right, through a hallway, and into a room where you can back-stab a monk. There are three more monks praying in front of an undying monk and the item they are looking at is a Gourd Seed (7/9), which you definitely want to get. Start by hugging the right side wall to get around to the back of the area and back-stab the large enemy. Then quietly backtrack to the other side of the room behind the praying monks. You can kill them fairly easily with Bloodsmoke Ninjutsu or just grab the Gourd Seed and then run and jump out the open window to the left. You'll see a woman who requests rice from the Divine Child, which you don't have yet. If you come back with some later and give it to her, she tells you how to use the rat/kite from earlier to get to a new area. You can ignore the big tree on the right for now and instead look off to the left where there are several enemies patrolling. The new enemy with a rice hat and a bladed staff is particularly dangerous and there are two of them in this area. The goal is to jump to a grapple point to the left of the broken bridge in the back of the area that leads into a cave, so it's up to you whether you want to clear out the enemies or just run past them. There's a Sculptor's Idol just ahead so you should probably get to it and rest, then come back if you want to scour this area.

Grapple into the cave and climb up a ledge, then continue forward to see the Sculptor's Idol. Commune and rest, then travel to the Upper Tower - Kuro's Room and have Emma reinforce your Healing Gourd. Return to the Shugendo idol, then jump down to a rickety platform to the left. Continue along to find another Memorial Mob and purchase a Persimmon (for use later), then head back to the idol. Going the other way, you can grapple to a branch, then continue along an upper or lower path (that ultimately lead to the same place).

External image
Your goal is to get to the upper wooden walkway which leads to a ledge that you can use to reach a new area. There are a few rat enemies along the path so dispatch them as you work through. Once you reach the top you need to shimmy across a ledge until you can climb up. From here, grapple to the tree branch above, then once more to solid ground. The wooden structure on the right leads to a mini-boss, so ignore that for now and circle around to the left and head towards a lone tree. Pick up the Red and White Pinwheel, then turn around and head back. Looking off the cliff to the right you'll see some platforms below. Drop down to them, then look right to see a wooden walkway along the cliff. Make a running jump to get to it, then follow it to the end and look down to see a reachable ledge.
External image
Jump down to it and press cn_X to grab on, then shimmy left and climb up to solid ground. Follow the path to a place where you can jump between vertical sides get up to the top. The White Pinwheel at the top is not needed, so then turn around and jump across the gap to the other side. Make your way up some walkways until you reach a dilapidated structure. Go in the opening on the right and take the items, then open the door and enter. Kill a new enemy and look to the left to see the outline of a person on the wall. If you hug the wall here, the section rotates and you can enter a secret area. Don't bother, though, as this leads back to a cave you briefly visited earlier that contains a Headless mini-boss. You have no reason to hassle him other than to kill him for the satisfaction of eventually doing so. Exit this building through the rear door to find a Sculptor's Idol (commune/rest) and you'll see a large bell to the left. Ringing this bell makes it so enemies are more difficult and increases their item drop chance and how much sen they drop. If you ring it, you receive the Bell Demon, a consumable item that you can use to reverse the effect. There's no reason to bother with this right now, so travel from the idol to the Shegundo idol and make your way back to the wooden structure at the top of the area (the covered wooden bridge).
External image
As you enter the bridge, the Armored Warrior (VIDEO) will emerge from the right. While you fight him, he will thrash about and break the walls of the bridge. Because of his armor, you cannot damage his health, only his posture. You must break his posture then deliver a deathblow close to an open ledge to kick him off, causing him to fall to his death.

You want to deflect his attacks and counter attack when you can to chip away at his posture. In addition to some basic sword attacks, he will do a perilous thrust that can be Mikiri Countered and a hard-hitting four attack combo that starts with a crouching motion (GIF), after which he is stunned long enough for several counter attacks. After defeating him you receive a Prayer Bead (16/40) and the Breath of Nature: Shadow Skill. Exit the bridge into a new area and commune/rest at the Sculptor's Idol. Redeem four prayer beads to receive the Fourth Prayer Necklace. For skills, continue working towards getting Ascending and Descending Carp, Flowing Water, Suppress Presence and Suppress Sound, Shinobi Eyes, and then Emma's Medicine: Potency.

The next destination is the large building above you to the left. Follow the path from the idol downward and kill some dogs at the bottom and if you want, follow the path on the right to reach the other side of the earlier broken bridge and a Heavy Coin Purse (and several other items, as well). Back up at the top, the path leads past some monks and to a large building. Clear out the monks, some of which throw exploding bombs, and grapple onto the roof of the large building. You can clear out the rats and drop into the courtyard to search this area if you want but there's nothing terribly worthwhile to be found. Instead, follow the roof around to the right and drop onto the roof of the adjacent building.

External image
Grapple to a cross beam inside, then stealth kill the two enemies around the upper perimeter. There are a few more enemies on the ground below including a dangerous mini-boss, Long-arm Centipede Sen’un (VIDEO).
Stealth kill a small enemy from above, use a firecracker, then kill the second small enemy. This should allow you time to grapple back up to safety before the mini-boss can attack you. Leave the building through the open door and go far enough along the outside path to lose the Centipede's aggro. Wait briefly, then slowly sneak back inside and grapple back up to the wooden beams. Lock on and deal the first deathblow with a plunging attack, after which you'll have to engage Long-arm Centipede directly. This boss really just has two attacks: a flurry of several slashes that you want to deflect and a three slash combo followed up with a perilous sweep that you want to jump over. His longer slashing combo has a timing of 1234.. 12345..6. You can break his posture through deflections alone, after which you can deal the second deathblow to receive a Prayer Bead (17/40). Exit this building through the open door and continue along the path ahead.

External image
Fight through several enemies as you follow the linear path and you'll eventually reach a platform with a burning fire. Continue further and you'll arrive at a small building before the larger building. Fight past some more enemies until you reach the walkway along the outside of the larger building. You need to circle the building on the left to find an entrance and there are a few of the tough bladed staff enemies in your way. I do not suggest engaging them, just run past them and around the building until you find your way inside (ignore a cave on the left as you work your way around the perimeter of the building). Once inside, run forward, then turn left and you'll see a Sculptor's Idol. Commune and rest, then run back outside and head into the cave that you passed on your way in.

External image
Kill a monk and continue forward past a few small enemies that can be annoying with fire attacks (just run past them). After you drop down to the area below, turn around and crouch to get into a low path. Follow it to the end where you can grapple up a couple of times and make your way outside. Open the door of the pagoda and inside you'll find the Senpou Esoteric Text which unlocks another skill tree. You can either grapple across the gap to the left or use the Homeward Idol to get back to the last idol. There is a table nearby that can be interacted with:

External image
Doing so transports you to the Halls of Illusion for a boss battle with the Folding Screen Monkeys (VIDEO).

This encounter is a game of cat and mouse more so than an actual battle where you must track down and kill four monkeys who attempt to elude you. Apparition monkeys will appear and attack you but the battle ends after the fourth main monkey is defeated.

The monkey in the Purple Robes will run away from you when it sees you approaching. It has really good vision, but poor hearing.
The monkey in the Orange Robes will alert all other monkeys when it spots you, which causes all of them to flee. It has poor hearing and vision.
The monkey in the Green Robes will run away from you when it hears you approaching. It has really good hearing, but poor vision.
The monkey in the White Robes, which is invisible, will follow you while creating apparitions. This monkey will leave glowing footprints indicating where it has been.

The absolute easiest way to complete this battle in about a minute is to use a Gachiin's Sugar before ringing the bell, then as soon as you enter the Hall of Illusions, turn around and kill the invisible White monkey behind you. Turn back around and grapple to the roof on the right, then run forward and kill the Orange Monkey. Run across the roof to the left side of the area and follow the roof to the right where the Purple monkey will see you. Chase him forward, then into a building (grapple to the top level) and kill him. To be safe, use another Gachiin's Sugar, then quickly run and grapple back to the tree in the middle of the area to kill the Green monkey, ending the battle and unlocking an achievement:

7. Part 5: Sunken Valley and Ashina Depths

External image
Head forward, jump and grapple across a gap and kill an enemy with a rifle when you land. Then continue forward and grapple across two tree branches to another platform with an enemy. You went up/left from here previously to get a Gourd Seed. Instead, head right and drop down, grapple across another gap and drop down once more to reach a platform where you can shimmy along the wall. Do so, then look ahead to see an area below with a tree branch grapple point and a patrolling enemy. There will be a second enemy just out of sight to the right and a stronger enemy with a cannon just past him in a little rock formation. One way to handle this is to stealth kill the first enemy, grapple/run away to lose aggro, then return and kill the second enemy so you can go one on one with the cannoneer. His melee attacks are slow and easily deflected and he can only shoot the cannon every so often (and remember, you can guard gunshots). After killing them, commune/rest at the Sculptor's Idol and then talk to the dying rat enemy nearby.

Looking ahead, you'll see a platform with a stone face and a bridge behind it.

External image
You can jump towards and grapple to the two platforms below in order to get to the larger platform (move quickly as you'll be shot at here) which contains a mini-boss, Snake Eyes Shirafuji (VIDEO). This encounter can be difficult until you learn her attacks and understand how to deal with them (sounds familiar, huh?). The perilous grab is particularly dangerous as it pulls you in, then stuns you so she can shoot you, which deals huge damage. As soon as you see it coming, jump backward immediately or you'll get caught. Right from the start, you can run to the left side of her area, grapple up to a branch, and then head around to the bridge in the back. If you run about halfway across the bridge to lose her aggro (once her health bar disappears), you can run back to the shimmy wall area and wait to completely lose aggro so that you can then drop down and CAREFULLY sneak up and deal a stealth deathblow (VIDEO). This strategy will make it so you only have to fight her normally for a single deathblow. Just be sure to zigzag on the bridge to try to avoid incoming gunfire.
Again, her biggest threat is her perilous grab, so as soon as you see it, jump back and to the side to avoid it. You want to employ the usual "attack until deflected, then be prepared to react" strategy. If she counter attacks with a single melee attack, deflect it and repeat. If she kicks you away, she will follow up with a gunshot that you can dodge through to then counter attack. After defeating her you will receive a Prayer Bead (18/40). Loot the items on this platform, climb up and hug the wall around to the left, then get ready to storm the Gun Fort.

External image
Run across the bridge and towards the end there will be a hole that you can fall through, then grapple as you fall to reach a tree branch. Keep moving/grappling/jumping forward to get back to solid ground and make your way up and to the left. Your goal is to get to an entrance at the top/left side of this area that leads to a path with a Sculptor's Idol. There are numerous enemies outside and inside so I'll leave it to you to kill them and explore the area for items. Try to avoid stepping on patches of rocks with hay underneath as these set off firecrackers that alert nearby enemies. If you act carefully you can stealth kill everyone outside, then hug the first wall inside and stealth kill an approaching enemy from cover (GIF), leaving two cannoneers inside. You can climb to the wooden truss from the outside and stealth kill one from above, then directly engage the last one (or just run through to the idol if it's easier). When the area is clear, follow the path to the Sculptor's Idol to commune and rest. Cross the nearby bridge and follow the path until you see a room with another mini boss, Long-arm Centipede Giraffe (VIDEO). Handle him just like the other one, deflect his flurries (which always come with a timing of 1-2-3-4.. 1-2-3-4-5.. 6) and jump to avoid his perilous sweep. There's no way to stealth the first deathblow so you must deal two to defeat him which awards you a Yellow Gunpowder and a Prayer Bead (19/40).
Pick up the Large Fan Shinobi Tool under the Buddha statue before dropping through the hole on the floor to the left. Crouch and go around to the left to find a Yellow Gunpowder, then go back and continue through an opening and down a path that leads to a fork. Right is a dead end so go left and you'll come to a ledge. Look up/right and you'll see a grapple point on a wooden beam.

External image
Grapple here and you'll see that there are two more grapple points, one on the left and one to the right. Grapple to the left first and run into a cave with a bunch of crickets to find a Divine Confetti, then run out and grapple to the other side. From this ledge, you can look down to see an item on the ground below. There are a few enemies (three mini centipedes and three poison lizards) in this small room so drop down, kill them, and loot the items to find a Prayer Bead (20/40), then grapple back to the upper platform. With the cricket cave across from you, grapple up to the left, then jump forward and grapple to a wooden walkway. Grapple jump from the end to a platform, then grapple up from here to the bridge and the Sculptor's Idol. Rest and redeem your four prayer beads for the Fifth Prayer Necklace, then head back to Long-arm Centipede Giraffe's room and unlock the door on the far side with the Gun Fort Shrine Key.
External image
You'll see a bridge outside but it's a trap and you cannot get across because when you get halfway across, the giant snake will attack you and break the bridge, causing you to fall into the water below. You want to avoid this if possible by running about 3/4 of the way across the shady part, then immediately turning around and running back to solid ground. This should trigger the snake to attack the bridge without causing you to fall. Should you fall into the water below, you'll have to try to swim to a cave on the right side of the area with a Sculptor's Idol while being attacked by the snake, but if you beeline it for the cave as soon as you hit the water, you should get there without getting killed.

Either way, travel to the Outskirts Wall - Stairway idol in Ashina Outskirts to advance some NPC questlines. Drop off on the left and go back to the building to interact with Anayama the Peddler. Talk to him several times and you will give him information on salt from an Eavesdrop in Ashina Castle. Run back to the idol to rest, then return to him and he will ask you to find someone to help him with his business, someone big and strong (also note that he sells the Phantom Kunai for 3000 sen that you eventually need for a prosthetic upgrade). Return to the idol and travel to the Senpou Temple, Mt. Kongo idol. Exit the building and head right to talk to Kotaro, the sad guy by the tree. Give him the "Red and White Pinwheel" and then "Suggest a travel destination," choosing "Tell him about Anayama the Peddler" which further expands Anayama's wares.

Drop down to the left to the area with the rat enemy and the kite mechanism. Equip Puppeteer Ninjutsu, then back-stab the rat and press cn_RB to perform the puppeteer skill (GIF). This will cause him to operate the mechanism and fully extend the kite which you can now use to access a new area. Make your way back to the main path and run to the building at the end, grapple into the ceiling, and continue through the next room and out the window. Grapple onto the large tree on the right and when you approach the end you'll get a grapple indicator on the kite.

External image
Use it to swing over to the other side. From here, look down and to the right and you'll see another platform below a tree branch but there will be no grapple indicator. Jump that way nonetheless and a grapple indicator will appear as you get closer that you can use to swing to the platform. Look right from here and you'll see another swing grapple indicator on a branch above, so use it to swing towards the final platform down below, which you'll need to grapple to as you get close enough. Enter the cave and commune/rest at the Sculptor's Idol.
There is one exit from this cave that leads to a precarious wooden platform. Walk out onto it and look down to see the giant snake below. You can lock onto him, then jump off and perform a deathblow, then another to kill him (GIF), which gives you the Fresh Serpent Viscera (an item that is required for the "Return" ending) and unlocks an achievement:

Great Serpent

You'll land on a platform below which is where the bridge that the snake destroyed previously lead to. This area is a dead end but be careful not to get close to the broken bridge before looting the nearby items (nothing of which is of any sort of importance) as the ground around the broken bridge is misleading and you will fall unexpectedly. When you're ready, jump into the water below and swim to the cave on the other side of the area.

External image
Commune/rest at the Sculptor's Idol, then grapple up to a platform that leads back outside. Continue heading forward and up until you reach a large valley with giant statues along the sides. Move through this area and you'll eventually see a platform with a dozen or so monkeys huddled together. Fight them if you want (you get a Monkey Booze for killing them all) or simply run past them to get to a large statue with a rope-like ledge that you can walk on to then grapple across to the platform on the other side. Commune/rest at the Sculptor's Idol. There may be an NPC nearby that asks for rice in exchange for info (I'm not sure what causes her to be there), but the gist is that the poison valley below leads to a temple that contains an item needed for one of the endings, which is what we'll go get now. If you look in the distance, you'll notice a large ape with his back to you that's one of the next major bosses. We'll be back for him in a bit. For now, look the other way for some ledges below you that you can drop down to.
Look ahead from the lowest ledge and you'll see some tree branches on either side about halfway down. Do a running jump and grapple to the one on the left, then jump/grapple over to the one on the right. You can then drop down to the ground level, but beware as the green water will cause poison buildup. Loot the items behind you, then head the other way. You'll see some swing grapple points above you that you can use to swing forward and reach a fork in the valley. There is a strong monkey enemy wielding two swords in this area and depending on where he is, you might be able to get behind him for a back-stab. If you need to fight him directly, just use the usual deflect/counter attack strategy to kill him. The fork to the left is a dead end with several monkeys and a few items strewn about. Your best plan here is to grapple to the branch above them, then swing from a tree down to the platform they are on and do a back-stab on any monkey, then use Bloodsmoke Ninjutsu so you can stealth kill the strong white monkey with the swords.

The right fork has a tent with a Memorial Mob NPC (with nothing really worth buying) and a cave beyond.

External image
Head into the cave and run forward, but keep moving at a steady pace and ignore the lizards. If you see a red kanji appear, it means that a wall-bound apparition is about to appear and attack you. If you keep moving, you'll get past them without issue. When you see the giant white snake, stay left and go between the two visible parts of it, after which you'll need to crouch to get under an overhang. Continue staying to the left as you make your way deeper into the cave. You'll need to jump onto a platform along the left wall, then drop down to a lower level at which point you'll see the snake in front of you and it's not happy. Drop down on the left, then climb up to a platform with a terrified monkey. Use Puppeteer Ninjutsu on the monkey and it will jump up to a high ledge on the left and start making noise. Watch the snake and as soon as it goes after the monkey, grapple up and quickly run into the building. You'll see a statue in the back with an item, Dried Serpent Viscera, which you need for the "Return" ending. Look up and you'll see a grapple point. Use it, follow the path to find a Divine Confetti, then backtrack slightly and look up for another grapple point that you can use to make your way to a ledge overlooking an open area with a large statue.
External image
Commune/rest at the Sculptor's Idol to the right of this statue. Grapple and climb up from the idol to reach a platform where you can get a good view of this area. There is a mini-boss here along with a few normal enemies - two by the structure to the left, one by the structure on the right, and one up on the scaffolding behind the structure on the right. The mini-boss Snake Eyes Shirahagi (VIDEO) is near the back wall just to the right of the slanted statue. This is basically a duplicate of Snake Eyes Shirafuji except fought in this poison area with a few enemies around. You want to deal a stealth deathblow to cut the fight in half. This is only possible, though, by using a Genshiin's Sugar, then grappling from the platform above the idol to the slanted statue and sneaking up on her from the side. You'll be leaving the normal enemies alive and hopefully you can kill the boss without any of them getting involved. I couldn't find a way to lose her aggro without resting at an idol, so it seems that the only other option is to run around and kill the four normal enemies, then deal two deathblows to Snake Eyes Shirahagi through regular combat. Once she is dead you will receive a Prayer Bead (21/40). You can then kill the enemies in the room to loot items (don't worry about the item atop the tall statue- you can't get that from here), then head forward through the cave.

Before dropping down to an area below, grapple into a small area up and to the left. Crouch to proceed and look left to find a ledge you can jump up to. Wall climb to reach the top and you'll be overlooking the previous area near a statue. Get close and you can grapple to the head to find a Prayer Bead (22/40). Backtrack, go left when at the bottom (crouch to get through), and kill a monkey to find a Monkey Booze. You can drop into the large open room ahead which will contain a boss later, then grapple up on the far side until you reach an outside area. Look left and talk with the samurai that you met earlier (unimportant NPC quest progression), then grapple across a gap and you'll find a Sculptor's Idol. Commune and rest, then walk to the edge and look ahead.

External image
You'll see some tree branches and a raised platform in the distance. There is an area below full of mist with an optional Headless mini-boss that you should avoid for now. There's actually no achievement related need to kill any of the Headless but if you want to, it'll be easier later in the game. Feel free to drop down there and scout for items if you want to. You can interact with a monk on the central platform in front of a statue, then turn around and look for the tree branch just below the ledge (with your back facing the statue). Jump down to it, then jump over to a lower branch to the right and follow it to a ledge. At the end of this path you can hug the wall and shimmy across. At the end, jump from the branch to a ledge on the left and slowly move forward. The area ahead contains a mini-boss and four monkeys. You can pull the monkeys to you by grabbing their aggro with shurikens (two shots will kill them). Kill all four, then from the branch on the left, run and grapple swing to a platform on the right. Continue forward and grapple up and to the right. At the top you'll see a grapple point on a tree branch and the roof of a building.

External image
The area below is full of mist and apparition enemies. Carefully grapple to the tree, then jump across onto the level of the roof that the branch leads you to (not the upper level) and go around to the other side to see a hole that leads into the building. Drop to the rafters and you'll see the Mist Noble, a joke of a mini-boss below. Do a plunging deathblow, then just continually attack him until you can do the second to kill him. This will dispel the mist and the apparition enemies in the surrounding areas.
If you look out the back of the building you'll see the path forward, but for now, explore the immediate area for items and then head back to fight Tokujiro the Glutton (VIDEO), the mini-boss that you just ran past. You can get to him by heading away from the house along the right wall until you see the second branch that you can grapple up to.

This guy is just a re-skinned version of Juzou the Drunkard from Hirata Estates. Make sure all of the monkeys are dead before starting this battle and fall back if needed to lose Tokujiro's aggro if necessary. A stealth deathblow will make things much easier, so grapple to the nearby branch, then run and grapple swing to the second branch to land on a platform behind him. Drop down the foe stealth deathblow, then engage him normally. Get when away from his perilous grab, dodge to the side when he does the delayed overhead slash, and deflect most of his other attacks until you can do the second deathblow. You'll receive Unrefined Sake and a Prayer Bead (23/40).

Follow the path up and around again to get back to the area with the house/Mist Noble and take the path to the left. Drop down to a ledge below and grapple across to a branch and you'll see the blue glow of a Sculptor's Idol down below. Drop down, grapple across, and drop down again to get to the idol; commune and rest. There is a tough Lone Shadow samurai in the ravine below. If you want to fight him, start by looking across the gap to find a dog which you can lock on to and kill with a shuriken so it doesn't bother you while fighting the samurai. You'll also see a familiar tent nearby with another Memorial Mob NPC, but nothing he is offering is worth buying. The area ahead, Mibu Village, contains a lot of weak enemies.

External image
A stream and lake separate it into two sides. For now, stick to the left side and make your way forward past mostly weak enemies who aren't worth fighting, as they will continue coming endlessly. Be aware of the blue-robed enemies who can do a perilous grab. There are several small buildings, a few with holes in the roof that you can use to explore the inside. Keep going until you see a tree with white leaves and a few enemies and items at the base, one is a Gourd Seed (8/9). From here, continue forward past a large enemy with a bell and find a bridge on the right side that leads to a Sculptor's Idol where you can commune and rest. Travel back to Upper Tower - Kuro's Room in Ashina Castle so Emma can reinforce your Healing Gourd, then return (Water Mill idol) and continue forward.
You'll see an NPC on the left as you enter a large, open area. This is O'Rin of the Water (VIDEO), a mini-boss who is initially non-hostile. Talk to her and she will ask if you've seen her lord and since you haven't, she will become hostile. You shouldn't need to attack her at all; instead, deflect her attacks and when you see her perilous sweep coming, jump over it. The difficulty comes in figuring out the timing of her attacks and deflecting properly. You'll need to try to find time to guard and reduce posture buildup if necessary. Continue deflecting her attacks until you can deal both deathblows to kill her, after which you will receive a Prayer Bead (24/40) and the Breath of Life: Shadow skill (which restores more vitality with every deathblow). Head back towards the idol and you'll see Jinzaemon Kumanogo, a familiar NPC. Talk to him to receive Jinza's Jizo Statue, then run back to the idol and redeem four prayer beads for the Sixth Prayer Necklace.

Head back past the O'Rin area and cross a bridge. Grapple to a tree branch and you'll see a building with several enemies in front.

External image
The goal here is to get into a crawlspace to the right of the house entrance and it's up to you whether or not you want to clear out the enemies first (if you do, run up and stealth kill the large one with the bell first). Follow the path under the house to the end to reach a Shinobi shortcut and press cn_X to use the rotating door, taking you to the inside of the house. Loot the items in the house and talk to the NPC if you want, then climb onto the rocks outside and grapple up to the upper level to find a Prayer Bead (25/40). Grab the other items around this area, then use the rotating door to get back outside (if you don't have full Spirit Emblems, go back and rest at the idol).
Follow the path around the left of the house and prepare for a battle with the Corrupted Monk (VIDEO). There are a few ways to cheese this boss, but my preferred method is to use a Divine Confetti and an Ako's Sugar, then stun lock him with Shinobi Firecrackers and, if needed, Fistfuls of Ash. The general gist is attack twice, firecracker/ash, attack twice, and repeat until you can deliver the deathblow. If you'd prefer to engage her normally, you still want to use Divine Confetti so your damage isn't terrible but the battle will be considerably more difficult. Once she is defeated, you will receive Memory: Corrupted Monk and the Mibu Breathing Technique skill which allows you to swim underwater. Commune/rest at the new Sculptor's Idol and enhance attack power with Memory: Corrupted Monk to permanently increase your attack power (from 5 to 6). Then run into the cave and you'll enter a large, open area.

External image
Interact with an item on a pedestal to receive the Shelter Stone. Head back to the idol and travel to the Bodhisattva Valley idol in Sunken Valley as it's now time to fight the Guardian Ape (VIDEO).
This is a difficult two phase battle. For the first phase, the general plan is to deflect his often erratic, flailing attacks and carefully chip away when you have an opening.

You can stun him every 20 seconds or so with the Shinobi Firecracker which will allow you to get several attacks in, but be careful as he will often rear up, then slam down right after the firecracker hits him (dodge to the side to avoid this).

He has two perilous attacks, a left to right sweep that you want to jump over and a charging grapple that you need to run directly backward to get away from.

He will sometimes swipe, then slam onto his back where he then flails back and forth a few times, if you can get around to his head you can safely attack while he is flailing.

If you get directly behind him he may fart out a cloud of poisonous gas (sidestep quickly to get out of it), then he will create distance, defecate into his hand, and jump into the air to throw his feces at you. If he does this, you want to run directly under him as soon as he jumps, then attack him a couple of times after he lands.

Once you deal the first deathblow, you will cut off the ape's head and it will die, only to come back to life for phase two.

This phase is immune to firecrackers but the loaded spear can be used to deal decent posture damage if you are able to deflect attacks to cause the ape to fall towards you onto its chest. The most important thing to be aware of is a perilous attack where it winds up, then releases a huge bloody cloud that causes damage and terror build up. As soon as you see this coming, run away in any direction as fast as you can.

He has a couple of patterns of five or so sword swipes that, if deflected properly, cause him to either fall onto his chest or rear upright for a falling downward slash which, if deflected properly, causes the same falling onto chest result (if you miss a deflect, he changes to a different attack). Once this happens, quickly stab him in the neck straight on with the Loaded Spear, then press cn_RT a second time (which yanks the centipede out and causes posture damage), then charge in for a few follow up attacks.

He also does a quick perilous sweep that you need to jump over, a slower, forward-lunging slash that you want to jump over after he lands, and a perilous sweep at the end of a high upwards jump that you need to jump over.

Once you deal another deathblow, the ape will be killed for good and an achievement will unlock:

Guardian Ape
Defeated the "Guardian Ape"

You will also receive Memory: Guardian Ape and the Slender Finger, which is the last Shinobi Tool. Commune and rest at the new Sculptor's Idol and enhance attack power with Memory: Guardian Ape to permanently increase your attack power (from 6 to 7), then run into the cave to find the Lotus of the Palace. Use the Homeward Idol to return to the Dilapidated Temple and talk to the Sculptor. Choose Fit New Prosthetic Tool and have him create the Divine Abduction from the Large Fan (9/10) and the Finger Whistle from the Slender Finger (10/10) and an achievement will unlock:

Having acquired both the Lotus of the Palace and the Shelter Stone, the story advances and most of the Ashina Castle idols can no longer be traveled to. Before continuing on, we'll be backtracking to use the new Mibu Breathing Technique to swim underwater in areas we've been in already. Start by traveling to the Temple Grounds idol in Senpou Valley.

Drop down to the roof below and head to the edge, looking down to see a small lake.

External image
Jump in and you'll get an Underwater Movement explanation. Kill the two treasure carps and then press cn_RT to dive, then take a minute to get acquainted with the controls. You can move up or down by aiming that way, then swimming forward. You can use cn_RT to dive straight down and cn_LT to swim straight up. Pressing cn_B causes you to dash forward quickly and can be done along with cn_LT/cn_RT to ascend/descend quickly. At the bottom of the lake is the Holy Chapter: Infested, which is needed for the Return ending. Swim into the cave and you'll see a statue holding an item, a Prayer Bead (26/40). Use the Homeward Idol, then travel to the Water Mill idol in Ashina Depths.
Back in Mibu Village, you want to explore the central lake and the opposite side of the area. From the idol, head right (opposite of the way that leads to O'Rin of the Water/Corrupted Monk) and you'll be on solid ground to the left of the water. Stay left and make your way forward, down a slope, and towards a house with an item on the roof.

External image
The enemies around here will spawn indefinitely so I suggest just running past them. Find the Pine Resin Ember (needed for an eventual Prosthetic upgrade) on the roof, then run back and jump into the water. Dive under, then fight off several fish, one of which will drop Red Carp Eyes (an NPC sidequest item). On the sea floor directly under some boats is a treasure chest with a Prayer Bead (27/40).
Use the Homeward Idol, then travel to the Abandoned Dungeon idol, which is the only option in Ashina Castle.

8. Part 6: Ashina Castle Revisited

External image
Ashina Castle is under siege and there are a few new mini-bosses here. Start by heading out towards the castle and eavesdrop on a guard, then kill him. You can quickly run up and stealth kill the large enemy with the bell in the courtyard, then grapple over the door and you'll see a guard run onto the bridge ahead and cower. Drop down and approach the open door and you'll encounter an Interior Ministry samurai. Fight him if you're so inclined (he gives 686 exp!), then talk to a dying guard under a tree. The main bridge entrance is not available so you need to find another way in.

External image
Drop down into the water, swim under to find a Treasure Carp Scale, then swim into the opening in the wall. Kill a Treasure Carp and continue forward, then swim to the surface when you can. Grapple up to ground level and while you could grapple up to the roof on the right, instead curve around and into a small building. Drop off to a lower level and go right to commune with the Ashina Reservoir idol (so it can be traveled to later), then go back inside, grapple up, and exit through the opposite door.
You'll see another Interior Ministry samurai waiting to ambush a guard, so kill them (stealth kill the samurai if possible), then commune with the Ashina Castle idol just ahead and to the right. The goal now is to get back onto the roof of the large central building, which is easier now as there's a path from a roof on the right side of the central path.

External image
Run onto the steps and grapple up to the right, then head forward along the rooftops. Use the new bridge to get up to the main roof, then run left and follow the path around to the right until you can grapple into the window at the end. Just run past all of the enemies as fighting them would be an absolute nightmare. Once inside, commune at the idol.
Go up the steps and circle around to the right to back-stab a blue robed enemy. Looking into the large room, you'll see a Lone Shadow samurai not really paying attention. Run up and stealth kill him and you should hear another ogre below (you could farm these two enemies for ~750 exp each time if you were so inclined). Jump over the railing and grapple to the central wooden beam, then run to the edge directly above the ogre. Hang from the ledge and lock onto the ogre and drop down and perform a plunging deathblow (GIF), then quickly run through the open doors into the next room and the ogre cannot follow you, so use this to your advantage to carefully attack him from safety. Once he is defeated you will receive a Prayer Bead (28/40) and the Shinobi Medicine Rank 3 skill. Leave the keep through the back door to see two enemies with their backs to you. Follow the path around and grapple onto a branch to Eavesdrop on the spear enemy, then kill him and the other guard and continue forward to commune with the Old Grave idol. Consume four prayer beads to receive the Seventh Prayer Necklace. Backtrack and head across the bridge where a Lone Shadow samurai will ambush the other two enemies. Run past them and continue along the path that leads to the Great Serpent Shrine.

You will be attacked by a few dogs when you reach the first building, so kill them, then creep forward and you'll see a mini-boss in the next building, Lone Shadow Masanaga the Spear-Bearer (VIDEO). As another strong Lone Shadow enemy, the same tactics will apply. Attack until deflected, then be ready to react to his counter attack. He will likely use a five-kick combo starting with a slow spinning kick that ends with a perilous attack that can be Mikiri Countered. He will also have a new poison combo that can inflict poison if not deflected properly. Carefully sneak around to the right and get behind him for a stealth deathblow, then defeat him to receive a Prayer Bead (29/40).

Travel from the newly available idol to the Upper Tower - Antechamber idol in Ashina castle. Kill the blue-robed enemy and then the Lone Shadow samurai from behind, then do a stealth deathblow on the first guard in the next room and use Bloodsmoke Ninjutsu so you can stealth kill the second enemy. Head upstairs and commune/rest at the Sculptor's Idol.

If you look into the next room you'll see the next mini-boss, Lone Shadow Vilehand (VIDEO). There is a Lone Shadow samurai to the left of the door that you can very carefully stealth deathblow and use Puppeteer Ninjutsu if you'd like. Either way, this Lone Shadow behaves very similarly to the others and is basically identical to the one that you just defeated at the Great Serpent Shrine. Look out for his five attack combo that starts with a slow spinning kick and ends with a perilous attack that can be Mikiri Countered and his new poison attacks. Defeat him to receive a Prayer Bead (30/40) and a Lump of Fat Wax. Before continuing onward, run back to the idol and travel to the Poison Pool idol in Ashina Depths.

From the idol, make your way into the cave to find a gravely injured enemy who claims he was hurt by a large ape:

External image
Continue into the open area ahead and prepare for another battle with the headless Guardian Ape (VIDEO). This time, though, you have to defeat his headless phase twice with the second phase being accompanied by another ape.

The first phase is no different than before - deflect his attacks, punish him when he falls onto his chest, and avoid his perilous attacks. After you deal the first deathblow he will run away and a second ape will drop in to help. I suggest immediately using an Ako's Sugar for extra damage.

Things will get hectic while they are both attacking you so you want to stun the brown ape with firecrackers and kill it as quickly as you can, then shift focus back to the Guardian Ape. Try to bait the Guardian Ape into doing the bloody terror scream by getting close, which should provide you enough time to firecracker the brown ape, then unleash a barrage of attacks and kill it. You can then shift your focus back to the Guardian Ape.

After dealing the second deathblow and the Shinobi Execution, you will receive Memory: Headless Ape and two Prayer Beads (31/40 and 32/40). Then approach the ape to deal another deathblow which uses the Mortal Blade to sever its immortality (GIF) and unlocks an achievement:

Guardian Ape Immortality Severed
Used the Mortal Blade to sever the Guardian Ape's undying

Use the nearby Homeward Idol and travel back to the Upper Tower - Ashina Dojo idol in Ashina Castle, then redeem four prayer beads for the Eighth Prayer Necklace and enhance attack power with Memory: Headless Ape to permanently increase your attack power (from 7 to 8). With all of that done, it is time for an extremely difficult boss battle. Make your way out through the open window in the dojo (beware the Lone Shadow samurai) and follow the roof around to the right, then grapple up to the upper level to trigger a cutscene. Approach Owl and talk to him to be given a very important option: Obey the Iron Code, Forsake Kuro or Break the Iron Code, stay loyal to Kuro.

External image
The first option leads to the Shura ending and the second leads to the other three. Select the second option, Break the Iron Code, stay loyal to Kuro and prepare to battle Great Shinobi Owl (VIDEO).
This fight is daunting. Owl is relentless and his attacks deal a large amount of posture damage, even if properly deflected. His posture bar depletes very quickly until you can get his health lower, so you need to chip away at his health and do your best to avoid/deflect his attacks, managing your health and posture along the way. Prepare for a long battle as you don't get a lot of opportunities to deal damage to Owl, so depleting his health bar will take a while.

As with many other enemies, attack until you get deflected, then prepare to deflect the almost certain counter attack. You will sometimes hit him for damage if he tries to do certain attacks/jumps/evades rather than deflecting you.

His main attacks during this phase:

1) Two-shuriken toss followed up by a forward flip sword slash: guard/deflect the shuriken, then dodge forward just to the right of him to avoid his slash and follow up with a whirlwind slash to hit him twice.

2) Kick-backflip-shuriken toss- deflect the kick, then dodge the shuriken.

3) Debuff bomb toss often preceded by a running slash: deflect the slash, then avoid the cloud of smoke and try to get some damage in. If you get debuffed, you can't heal or use items for 30 seconds.

4) Single-shuriken toss to charging slice: deflect both (you will stagger briefly)- do not mistake this for the two-shuriken toss to forward flip.

5) Slash/shoulder charge combo: this is rare but very dangerous. He does a slash to shoulder charge to follow up slash, then throws out a swathe of firecrackers and ends with a great slash. You need to deflect the slash/charge/slash and immediately dodge (or run) forward and to his right to avoid the firecrackers and final slash, then counter attack.

6) Multi-slash combo: he does a few of these and if you get the timing down you can deflect until the end, then dodge through the final slash and counter attack. The most common is a double slash, then a spinning slash that you want to quickly dodge through to the right. He sometimes instead finishes with a slower overhead angled slash that you want to also dodge through to the right but you need to delay your dash slightly to avoid taking damage.

After the first deathblow, his second phase begins, which is similar but adds a few new attacks.

1) Kick-backflip-shuriken toss instead throws out a wide arc of poison that lingers for 10 or so seconds.

2) Ground pound that releases a harmless cloud of smoke but stuns you briefly and breaks your lock on. Try to run away and lock back on quickly.

Continue with the same strategy you used in phase one and after you deal the second deathblow, you'll get the prompt for the Shinobi Execution, after which an achievement will unlock:

Great Shinobi - Owl
Defeated "Great Shinobi - Owl"

You'll then receive Memory: Great Shinobi and the Aromatic Branch. Commune/rest at the Sculptor's Idol, then enhance attack power with Memory: Great Shinobi to permanently increase your attack power (from 8 to 9). From here, you want to take care of some specific tasks related to the endings.

Head inside and talk to Kuro multiple times. You'll receive the Page's Diary during one conversation and Okami's Ancient Text during the next. Continue talking to him until you are told to talk to Emma. Do so (rest at the idol if she's not nearby) to receive the Immortal Severance Scrap, then talk to Kuro again. Interact with the Incense Burner, then finish the conversation with Kuro and talk to him once more (Dragon Tears will be discussed). Hug the wall inside the library for an Eavesdrop opportunity with Kuro where he says "We're almost there... do what must be done".

External image
Rest at the idol and Emma will have moved upstairs. Talk to her and choose "I agree. Kuro cannot be allowed to die". Rest at the idol and talk to Emma again to receive Tomoe's Note. Talk to her once more, then go back to the idol and travel to the Old Grave idol in Ashina Castle. Head left and talk to Emma twice by the tombstones, then travel to the Dilapidated Temple. You will see Emma and the Sculptor inside- before doing anything else, go around back and Eavesdrop through the open window.

External image
Then go inside to talk to Emma and "ask about what you overheard". Then "ask what she is hiding" to receive the Father's Bell Charm. If you interact with the Buddha statue next to Emma you will be taken to Hirata Estate on a different timeline, but don't do that quite yet.

Travel to the Inner Sanctum and ask the Divine Child for rice. Immediately consume it, then travel away to any other idol and then return. Request rice from the Divine Child again, consume it, then travel away and return. Talk to the Divine Child and she will request a Persimmon. Give her one and you will receive Rice and Rice for Kuro. Travel to Upper Tower - Kuro's Room and talk to Kuro. You'll give him the rice, then rest at the idol and talk to him again to receive a Sweet Rice Ball. Consume the Sweet Rice Ball, talk to Kuro, then return to the Inner Sanctum. Talk to the Divine Child (twice, if needed) and give her the Holy Chapter: Infested. Rest at the idol and the Divine Child should no longer be inside. Travel to the Halls of Illusion via the blue beam of light in the back of this area and talk to the Divine Child straight ahead.

External image
Leave the Halls of Illusion, then travel to the Main Hall idol in Senpou Temple. Exit the hall to the left and head into the nearby cave. Run forward and after dropping to a lower level, turn around and crouch to get into a low pathway. Follow this path to the end to find a monk that you can interact with. Do so to receive the Holy Chapter: Dragon's Return, then travel back to the Inner Sanctum and talk to the Divine Child twice. Choose "Give Persimmons of the Serpent," then rest at the idol and the doors will close. Approach them and Eavesdrop, then rest at the idol and the doors will open back up. Go inside and talk to the Divine Child a final time to receive the Frozen Tears.

Return to the Dilapidated Temple and interact with the Buddha statue. You will appear at Hirata Estate in front of the burning area in a different timeline.

External image
Inside the burning area where you met Owl much earlier, you'll see an enemy with his back to you. This is Lone Shadow, Masanaga the Spear-Bearer (VIDEO) who you already fought at the Great Serpent Shrine and the battle is similar, but this time, he can use a whistle to summon dogs. You want to interrupt this as soon as he does it to prevent the dogs from being summoned and the easiest way to do so is to throw a shuriken at him. His attacks are basically the same as previous battles but he does have a few new attack combos that you should be able to deflect easily. Stay aggressive with attacks/deflects and watch to Mikiri Counter the perilous attack at the end of the five kick combo. As long as he never summons the dogs, you shouldn't have much problem dealing both deathblows, after which you'll receive a Prayer Bead (33/40). Continue past some enemies (Gachiin's sugar and Bloodsmoke Ninjutsu make it easier) deeper into the estate and around to the right to reach the next Sculptor's Idol.

Head through the burning building and grapple onto the roof. Look ahead and you'll see three weak enemies on the ground and three Lone Shadow samurai on the roof. Running past them can cause problems, so I kill them. Start by inching around towards the first Lone Shadow and get his attention with a shuriken, then drop down and go back towards the idol where you can fight him alone. Repeat with the second, then go back to the roof and kill the third from behind when he walks the other way. The three normal enemies below should be none the wiser, so drop down and kill them, then head into the large open area where Juzou the Drunkard was fought much earlier. If you grapple onto the tall rock you'll see him again, this time with a Lone Shadow samurai and an Eavesdrop opportunity.

External image
There are a few normal enemies in the courtyard (one off to the far right) and several enemies in the room to the left that I suggest you clear out first. Then run in and take out the other two normal enemies before running away, ideally kiting just the Lone Shadow samurai so you can take him out alone.
Run away again if needed so that Juzou loses aggro, then sneak up and deliver the first deathblow from behind (VIDEO). He behaves the same as before so deflect, dodge, and counter attack until you can deal the second deathblow, after which you will receive a Prayer Bead (34/40). Carefully enter the next building. There are a few enemies patrolling inside and some of them are reasonably tough. You should be able to stealth kill a spear-wielding enemy patrolling the hall on the left once he turns his back. You can then hug the nearby wall, lean out, and throw a ceramic shard at the visible enemy to lure him to you so you can perform a stealth deathblow (GIF). Repeat with the second visible enemy and all that will be left is a spear-wielding enemy behind the screen. Kill him, then rest at the Sculptor's Idol just ahead.

The next area is where the Lady Butterfly battle took place. This time you'll be fighting Owl, but it's a younger version than the one you killed in Ashina Castle and another step up in difficulty. You need to kill him eventually but not necessarily right now, so since this is one of the toughest bosses in the game, I suggest coming back for him later. Instead, travel to the Wedding Cave Door idol in Ashina Depths.

Enter the cave and run to the back of the area. You'll see a palanquin like you used earlier to get past the giant snake.

External image
Go inside and interact and press cn_X to pray, which triggers a cutscene. When it's over you'll regain control in the game's final area, Fountainhead Palace, and an achievement will unlock:

Ashina Traveler
Traveled to all areas of the game
Ashina Traveler

9. Part 7: Fountainhead Palace

External image
Follow the rope path to the bottom and commune/rest at the Sculptor's Idol. Look into the next area to see a bridge with trees on either side. This will be the battle with the true Corrupted Monk (VIDEO), a boss that requires three deathblows to defeat.

You can perform a stealth deathblow on the second phase and stunlock the third phase with firecrackers and fistfuls of ash, but you need to defeat the first phase normally. She has a wide variety of slash attacks that can be deflected, but the timing of them can be erratic. Mikiri counter her perilous thrust and jump over her perilous sweep (be careful not to jump into a perilous double sweep). After dealing the first deathblow, quickly grapple up onto the branch above the bridge, look down, and once she appears below you, jump towards her and perform the second deathblow (GIF).

After the second deathblow, there will be a brief animation and the third phase will begin. Use an Ako's Sugar during the animation and be ready to stun her with a firecracker as soon as she is susceptible to damage. Attack three times, use another firecracker, and repeat. Should you run out of spirit emblems, switch to Fistful of Ash to stun her and continue the process until you can deal the third deathblow, then the Shinobi Execution, after which an achievement will unlock:

Corrupted Monk
Defeated the "Corrupted Monk"

You will then receive Memory: True Monk and the Dragon's Tally Board (which expands vendor stock). Rest at the new Sculptor's Idol and enhance attack power with Memory: True Monk to permanently increase your attack power (from 9 to 10). Head through the nearby doors for a gorgeous view of Fountainhead Palace, the game's final area.

External image
The immediate goal is to make your way through the buildings below around the left side of the lake to get to the big tree in the middle and kill an enemy who shoots lightning, preventing you from swimming in the water. Start by following the path to the right, grappling to a branch, then dropping to the ground below. From here, enter the nearby building to encounter a Palace Noble that will attempt to drain your life force via a line of sight ranged attack that builds up a meter on your screen (much like Terror or Poison). Should this meter fill up, you will become "Enfeebled," which leaves you almost completely helpless and unable to use a resurrection. If you become Enfeebled, you will almost certainly die but the effect will wear off on its own after about 20 seconds OR if you manage to kill the Palace Noble that caused it. These enemies are otherwise very weak and best killed by charging directly at them (just try to keep something between you to avoid Enfeeblement build up if they see you from a distance).

Kill the other two Palace Nobles in this building, then continue forward. Grapple onto the roof of the next building and carefully stealth kill the three guards. You can drop down on the lakeside and kill the enemy on the small bridge, with stealth if possible or directly if you want to see how their attacks work. Just don't go into the water or the mini-boss on the tree will certainly kill you with his lightning attack. Grapple back onto the first level roof of the previous building and make your way around the right side to stealth kill another enemy. There are two enemies patrolling the path next to the building on the waterfall side and a Palace Noble inside but there's no real reason to bother with them.

Grapple onto the roof that is overlooking the next area.

External image
There are several dogs here and a Palace Noble in the room on the left. These dogs can shoot lightning at you, giving you the opportunity to do a lightning reversal as explained on the wall in the Ashina Castle dojo. If you take lightning damage while airborne, you can press cn_RB to launch it back, preventing you from taking any damage provided you do so before landing. The best way to deal with the enemies in this area is to first kill the nearby dogs in the water with shuriken, charge in the room on the left and kill the Palace Noble, then run back out and grapple back to safety. You can take out any other aggro'd dogs with shuriken, then make your way through the building and take out the rest of the dogs the same way. Enter the open door to the next building and commune/rest at the Sculptor's Idol.

This next stretch is extremely dangerous as there are several Palace Nobles to contend with. Hug the wall at the start of the first hallway and the first Palace Noble will come right to you for a stealth deathblow (GIF). There is another in an area to the left but if you crouch to go through this hall, he will not see you. An old woman just ahead will warn you of the Palace Nobles in this area. Look left and you'll see one on a bridge on the distance and in the watery area behind the woman are two more. Hug the left wall so the screens block your line of sight from the two behind the old woman. Run into the next room and quickly turn left to kill one, then get into the nearby opening to get out of the line of sight of the other Palace Noble and wait for him to lose aggro. Then run over and kill him. Be careful if you enter the room with a seated enemy in the back left as there is another palace noble around the corner left of him that you need to deal with first. Once you're ready, follow the back wall to the right and you'll see a grapple point in the ceiling.

External image
Be careful, though, as three enemies are patrolling this area including a Palace Noble. Try to get a view of their location, then when it's safe, drop behind them and take all three out with Bloodsmoke Ninjutsu. Then grapple back up and drop through a hole on the other side to kill a stationary palace noble.
Once everyone in this immediate vicinity is dead, follow the perimeter path to an item in the back corner, then looking ahead you'll see two enemies in the distance. There is another palace noble to their left and on three more palace nobles on the other side of the building to their right. Also there are three more enemies inside the building which is accessible from the right side. Make your way to the wall near the two enemies on the left of the building, then quickly jump over the rail and charge the Palace Noble, then charge left and kill the other Palace Noble. You can then contend with the remaining enemy. With these enemies dead, backtrack to a small opening in the ground that you can dive into to reach the inside of a building where you will find three treasure carp scales and a chest with Water of the Palace. This item can be given to the strange NPC in the house with the rotating door in Mibu Village in order to get five more treasure carp scales should you need them later. Head back to where you killed the last enemies and go through the nearby door to commune/rest at the Sculptor's Idol (feel free to go back and try to kill the remaining enemies in the area but it's honestly not worth it).

As you walk onto the nearby bridge, a giant carp will jump out of the water and destroy it (GIF). Before continuing forward, go left behind the pagoda to find a Divine Confetti, then grapple onto the roof of the building you just came through. Follow a straight path on the left side of the rooftops and you can circle behind the first enemy for a deathblow. Sneak around to deathblow the far enemy, then do the same with the remaining one. Drop off in the back and circle around behind the Sakura Bull of the Palace (VIDEO). When you get close it will sense you and start to turn around. When it is facing the wall, use a firecracker and it will rear up on its back legs. After it lands, it will charge forward and as soon as it does, use another firecracker and it will smash into the wall and knock itself out, allowing for an immediate deathblow. If this doesn't work you can run back to the idol to try again or just engage it normally - get some distance so it charges you, deflect it, then run up and attack its head a few times before running away and repeating. After defeating it you will receive a Prayer Bead (35/40) and the Beast's Karma passive skill. Loot the nearby items and head back to the Flower Viewing Stage idol.

Run onto the broken bridge and grapple across to a tree branch. There are numerous enemies around this area, many of which can attack you with ranged attacks. Start by jumping down to the far side of the broken bridge and heading around the left side of the nearby building. Grapple onto the first level roof and circle around to the back, then grapple over to a branch, then up to the ledge near an enemy standing above a waterfall who somehow does not notice you.

External image
Get behind him for a deathblow, then jump onto the roof of the building on the right to stealth kill the enemy up there. From this roof, you can see two enemies on a platform ahead to the left overlooking a lower platform with some more enemies. Head back to the left and you'll see a grapple point at the end of a walkway,grapple to it and look ahead to see two enemies. Hug the left walk and sneak up on them, doing a stealth kill on the far enemy as he is the tougher of the two. From here you can kill the two enemies on the connected platform. Run up to stealth kill the first, then quickly charge and kill the second. Fall back before you get spotted by enemies below. You can grapple up to a roof on the left and get a better view of the area. There are four enemies on a large platform below but there's no real reason to hassle with them. There are some dogs in the pool of a waterfall behind you. Drop down and kill them, then climb the rocks on the right to find another waterfall pool with more dogs. Climb back on the rocks you were just on and look up to see a grapple point.

External image
Use it to reach an elevated platform, then climb up to the next level and grapple two more times to reach an upper area. The nearby door is locked but look left and go to a platform on the other side of the waterfall. If you position yourself just right you can see a grapple point on the wall off to the left. Run and jump towards it, then grapple to it to reach a cave. Continue through (kill lizards with shuriken) and you can jump and grapple to the roof of a building once back outside, then drop off the far side to reach a Sculptor's Idol. Commune and rest if needed, then talk to the NPC in the nearby barrel. You need to eventually purchase both Lapis Lazuli from him (the final and rarest Prosthetic Tool upgrade material), requiring twelve treasure carp scales. I had ten at this point and there are plenty more to obtain. Travel to the Ashina Depths - Water Mill idol and take the Water of the Palace to the strange NPC in the last house in Mibu Village to receive a Dragonspring Sake, then rest at an idol and return to kill him and he will drop five treasure carp scales. Head back to the Near Pot Noble idol in Fountainhead Palace and buy both Lapis Lazuli from the Pot Noble.
He will then have a "Talk" option, so talk to him a few times and "Listen to his secret" to receive the Truly Precious Bait. Loot the Divine Confetti to his left before backtracking through the cave to the locked door.

From here you need to head down the stairs and kill the two enemies in the room at the bottom. Once they are dead, head to the end to see a platform below with five enemies.

External image
Behind them to the left is another platform with a Sculptor's Idol. From there you can jump to the tree to get to the enemy at the end of the branch that prevents you from getting into the water. The ideal plan of attack is to quickly sneak up on the four enemies with their backs to you and do a back-stab on one of the spear wielders, use Bloodsmoke Ninjutsu, then back-stab the other spear wielder and use Bloodsmoke Ninjutsu again. Then quickly get behind the purple enemy and back-stab him (Bloodsmoke Ninjutsu again if you can), after which you should sprint to the Sculptor's Idol to quickly commune and rest.
From here you can see Okami Leader Shizu out on the tree branch. Grapple across and charge him. If he does a lightning attack, try to do a lightning reversal, then just run up and kill him to receive a Prayer Bead (36/40). Use the homeward idol to return to the previous idol, then redeem four prayer beads for the Ninth Prayer Necklace. You can now safely jump into the water below and explore. It's a rather large area with several fish enemies and a few Treasure Carp. There are items scattered about on the floor, the most important of which is a Prayer Bead (37/40) in a chest at the bottom of a deep hole near a Headless mini-boss and a large fish skeleton. Be careful near the Headless as he can inflict terror with his ranged attack. Killing him is not necessary so try to find the chest, get the prayer bead, and get away (hold cn_LT and tap cn_B to swim upward quickly).

As you explore to the left side of the lake, the giant carp will appear and swim into an opening. Once you've explored the lake fully, head into this hole and get into the enclosed tunnel structure on the right. Be careful as the carp patrols the area around here and will attack you if he sees you, so try to avoid detection. Swim through this enclosed structure and you'll see a building at the far end of the area with a hole in the front (it's hard to see from a distance). Try to wait for the carp to look away and quickly swim towards the building and into the hole. The carp will likely see you and kill you, so resurrect and immediately swim the rest of the way and you should make it.

Once you make it into the building, continue through and then swim up to the surface. Grapple up a few times to reach a platform with a Sculptor's Idol.

External image
Commune and rest, then enter the building ahead. There are a few weak noble enemies inside, so kill them, open the door on the left, then head right and find a Gourd Seed (9/9) in a treasure chest. Open the door in the back, then run back to the idol to travel to the Dilapidated Temple. Have Emma reinforce your Healing Gourd and a trophy will unlock:

Ultimate Healing Gourd
Fully upgraded the "Healing Gourd"

With three Lapis Lazuli, you technically have the means to make a final Prosthetic Tool Upgrade, but it's unlikely that you've unlocked enough prerequisite upgrades yet (or have sufficient resources/sen). I suggest following this unlock pathing as it crosses over the two most useful upgrades on the way to a final upgrade, Phoenix's Lilac Umbrella and Malcontent. You may not have the resources for the final upgrade until playthrough 2, but once you do finally unlock an upgrade in the last column, an achievement will unlock:

Travel back to the Palace Grounds idol and head through the building again. Grapple across the three branches to get to a platform on the other side, then follow the path up and then around to the left.

External image
This linear path leads to a Sculptor's Idol but there are three potentially tough enemies along the way so it's up to you whether you want to fight them or just run past. If you grapple up the ledges on the right you can take out the one up there with repeated attacks and hopefully the two below will not notice. Commune/rest at he idol, then follow the path into a cave. Pray next to the woman and a cutscene will occur, after which the Divine Dragon encounter will begin (VIDEO).

The first phase requires that you kill a dozen or so Old Dragons of the Tree. These slow-moving enemies provide little threat, just beware the poison gas they emit so you don't get poisoned. Trees will occasionally burst out of the ground. Run away once you notice this happening so you don't take damage from them. Grapple onto one, then do a plunging deathblow onto an enemy and you will spin it in a wide arc, killing anything else close by. More trees will burst from the ground and darker enemies will start to appear. Once you kill all of the white enemies, the second phase will begin.

The Divine Dragon will appear and send you flying backward. Your goal now is to grapple onto the trees, specifically onto one once a lightning charge appears on it. When you do, you'll absorb the charge and launch into the air. Lock onto the Divine Dragon, then press cn_RB to launch the lightning at it. You'll need to try to avoid the dragon's attacks while you repeat this process, an overhead slam that can be dodged to the side and a horizontal slash that can be jumped over. The dragon will also occasionally send you flying backward and if you're holding a lightning charge when this happens, you'll take lethal damage when you land on the ground. Once you've dealt enough damage, you will be knocked back and the trees will disappear. The dragon will then bombard you with a barrage of attacks that you need to avoid, vertical slashes by running/dodging to the side and perilous sweeps by jumping over. Eventually, he will stop and the trees will reappear. Absorb another lightning charge, throw it at the dragon, and an animation will occur which ends with the dragon collapsing to the ground. Run up its sword and perform a deathblow to unlock an achievement:

Gracious Gift of Tears

10. Part 8: Ashina Castle Re-revisited

External image
You'll appear in Kuro's room and receive Memory: Divine Dragon and the Divine Dragon's Tears. Talk to Emma to receive the Secret Passage Key. One of her dialogue options is "Isshin's parting words?" If you have unlocked the final skill of any skill tree, Emma will give you the Mushin Esoteric Text. If you haven't, you can do so later, then come back and talk with her before ending the playthrough. It's hard to gauge when you will be able to, but when you do unlock the final single skill in any of the skill trees, an achievement will unlock:
