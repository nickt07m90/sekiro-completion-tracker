name: Upgrade Sekiro Tracker

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Run transformation
        run: python3 upgrade_tracker.py index.html --output index.html
      
      - name: Commit updated file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Upgrade tracker with sections, resume, and achievements"
          git push
      
      - name: Cleanup
        run: |
          git rm upgrade_tracker.py .github/workflows/transform.yml
          git commit -m "Remove transformation script (no longer needed)"
          git push
